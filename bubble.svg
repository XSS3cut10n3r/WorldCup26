<text class="sans" x="108" y="562" fill="#7C808A" font-size="13">the easiest the bar can get</text>
<text class="mono" x="108" y="622" fill="#15171C" font-size="68" font-weight="700">3</text>
<text class="sans" x="230" y="606" fill="#15171C" font-size="20">points</text>
<text class="sans" x="230" y="628" fill="#7C808A" font-size="12.5">The weakest 8th-best third any</text>
<text class="sans" x="230" y="644" fill="#7C808A" font-size="12.5">sequence of results can produce.</text>
<rect x="560" y="502" width="440" height="150" rx="4" fill="#FFFFFF" stroke="#E7E3DA" stroke-width="1"/>
<rect x="560" y="502" width="6" height="150" fill="#A23139"/>
<text class="sans" x="588" y="540" fill="#A23139" font-size="15" font-weight="700" letter-spacing="1">HIGHEST POSSIBLE</text>
<text class="sans" x="588" y="562" fill="#7C808A" font-size="13">the hardest the bar can get</text>
<text class="mono" x="588" y="622" fill="#15171C" font-size="68" font-weight="700">3</text>
<text class="sans" x="710" y="606" fill="#15171C" font-size="20">points</text>
<text class="sans" x="710" y="628" fill="#7C808A" font-size="12.5">The strongest 8th-best third the</text>
<text class="sans" x="710" y="644" fill="#7C808A" font-size="12.5">results can be forced to require.</text>
<text class="sans" x="80" y="712" fill="#4A4E57" font-size="15"><tspan fill="#15171C" font-weight="700">27</tspan> teams are already mathematically through&#160;&#160;&#183;&#160;&#160;<tspan fill="#15171C" font-weight="700">10</tspan> are out&#160;&#160;&#183;&#160;&#160;<tspan fill="#15171C" font-weight="700">6</tspan> group games still to play.</text>
