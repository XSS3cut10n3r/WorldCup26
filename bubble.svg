<defs><style>.serif{font-family:Georgia,"Times New Roman",serif;}.sans{font-family:"Helvetica Neue",Arial,sans-serif;}.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}</style></defs>
<rect x="0" y="0" width="1080" height="1524" fill="#FCFBF8"/>
