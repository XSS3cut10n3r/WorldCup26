<text class="sans" x="80" y="1454" fill="#7C808A" font-size="12.5">Thirds ranked by points, then goal difference, then goals for.</text>
<text class="sans" x="80" y="1472" fill="#7C808A" font-size="12.5">PTS / GD / GF and LEFT are current values and games still to play; open-group rows are provisional.</text>
<text class="sans" x="80" y="1494" fill="#7C808A" font-size="12.5">THROUGH and OUT are mathematical certainties; ON THE BUBBLE means the seat is still live for that side.</text>
