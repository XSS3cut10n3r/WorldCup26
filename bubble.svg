<text class="sans" x="80" y="40" fill="#FCFBF8" font-size="14" font-weight="700" letter-spacing="2.5">WORLD CUP 2026&#160;&#160;&#183;&#160;&#160;GROUP STAGE</text>
<text class="sans" x="1000" y="40" fill="#FCFBF8" font-size="14" font-weight="700" letter-spacing="2.5" text-anchor="end">QUALIFICATION BOUNDS</text>
<text class="serif" x="80" y="165" fill="#15171C" font-size="58" font-weight="700" letter-spacing="-0.5">The race for the last</text>
<text class="serif" x="80" y="227" fill="#15171C" font-size="58" font-weight="700" letter-spacing="-0.5">third-place ticket</text>
<text class="sans" x="80" y="286" fill="#4A4E57" font-size="20">Eight of the twelve third-placed teams advance to the Round of 32. With group games still</text>
<text class="sans" x="80" y="316" fill="#4A4E57" font-size="20">to be played, the cut-off for that eighth and final seat is not yet fixed, but it can</text>
<text class="sans" x="80" y="346" fill="#4A4E57" font-size="20">only land between these two bounds, computed exactly over every possible result.</text>
<line x1="80" y1="384" x2="1000" y2="384" stroke="#E2DFD7" stroke-width="1"/>
<text class="sans" x="80" y="432" fill="#15171C" font-size="15" font-weight="700" letter-spacing="2.5">THE CUT-OFF, BOUNDED</text>
<rect x="80" y="442" width="46" height="3" fill="#15171C"/>
<text class="sans" x="80" y="467" fill="#4A4E57" font-size="15">Points only: with goal difference adversarial, a team level on points with the bar is not safe.</text>
<rect x="80" y="502" width="440" height="150" rx="4" fill="#FFFFFF" stroke="#E7E3DA" stroke-width="1"/>
<rect x="80" y="502" width="6" height="150" fill="#2E6E66"/>
