<text class="sans" x="80" y="1402" fill="#7C808A" font-size="12.5">Thirds are ranked by points, goal difference, goals scored, conduct score, then FIFA ranking. PTS and LEFT are current points and group games left.</text>
<text class="sans" x="80" y="1424" fill="#7C808A" font-size="12.5">THROUGH and OUT are mathematical certainties: a side is THROUGH only if it qualifies in every remaining result, OUT only if it qualifies in none.</text>
<rect x="80" y="1448" width="11" height="11" fill="#A23139"/>
<text class="sans" x="100" y="1458" fill="#15171C" font-size="15" font-weight="700">Provisional: the standings above shift as the remaining group fixtures are played.</text>
<text class="sans" x="80" y="1484" fill="#7C808A" font-size="12.5">Method&#160;&#160;&#183;&#160;&#160;exact enumeration of every win / draw / loss outcome of the group games still to play. Goals are unbounded, so bounds are in points.</text>
