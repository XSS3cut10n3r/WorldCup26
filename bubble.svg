<svg viewBox="0 0 1080 1520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
<defs><style>.serif{font-family:Georgia,"Times New Roman",serif;}.sans{font-family:"Helvetica Neue",Arial,sans-serif;}.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}</style></defs>
<rect x="0" y="0" width="1080" height="1520" fill="#FCFBF8"/>
<rect x="0" y="0" width="1080" height="64" fill="#15171C"/>
<text class="sans" x="80" y="40" fill="#FCFBF8" font-size="14" font-weight="700" letter-spacing="2.5">WORLD CUP 2026&#160;&#160;&#183;&#160;&#160;GROUP STAGE</text>
<text class="sans" x="1000" y="40" fill="#FCFBF8" font-size="14" font-weight="700" letter-spacing="2.5" text-anchor="end">MONTE-CARLO PROJECTION</text>
<text class="serif" x="80" y="165" fill="#15171C" font-size="58" font-weight="700" letter-spacing="-0.5">The race for the last</text>
<text class="serif" x="80" y="227" fill="#15171C" font-size="58" font-weight="700" letter-spacing="-0.5">third-place ticket</text>
<text class="sans" x="80" y="286" fill="#4A4E57" font-size="20">Eight of the twelve third-placed teams advance to the Round of 32. Across 1,000,000</text>
<text class="sans" x="80" y="316" fill="#4A4E57" font-size="20">simulations of the group games still to be played, this is how good a side has had to</text>
<text class="sans" x="80" y="346" fill="#4A4E57" font-size="20">be to claim that eighth and final place: the cut-off seat.</text>
<line x1="80" y1="384" x2="1000" y2="384" stroke="#E2DFD7" stroke-width="1"/>
<text class="sans" x="80" y="432" fill="#15171C" font-size="15" font-weight="700" letter-spacing="2.5">THE CUT-OFF LINE</text>
<rect x="80" y="442" width="46" height="3" fill="#15171C"/>
<text class="sans" x="80" y="467" fill="#4A4E57" font-size="15">The 8th-best third-placed team in each scenario: the last side to qualify.</text>
<text class="sans" x="240" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5">TEAM</text>
<text class="sans" x="456" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">P</text>
<text class="sans" x="508" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">PTS</text>
<text class="sans" x="560" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">GD</text>
<text class="sans" x="612" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">GF</text>
<text class="sans" x="664" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">CON</text>
<text class="sans" x="716" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">FIFA</text>
<text class="sans" x="762" y="506" fill="#7C808A" font-size="12" font-weight="700" letter-spacing="1.5">WHAT IT MEANS</text>
<line x1="80" y1="518" x2="1000" y2="518" stroke="#C9C5BA" stroke-width="1.5"/>
<rect x="80" y="538" width="6" height="68" fill="#2E6E66"/>
<text class="sans" x="100" y="566" fill="#2E6E66" font-size="15" font-weight="700">LOWEST</text>
<text class="sans" x="100" y="586" fill="#7C808A" font-size="12.5">easiest bar</text>
<text class="serif" x="240" y="578" fill="#15171C" font-size="22">Algeria</text>
<text class="mono" x="456" y="579" fill="#15171C" font-size="20" text-anchor="middle">3</text>
<text class="mono" x="508" y="579" fill="#15171C" font-size="20" font-weight="700" text-anchor="middle">3</text>
<text class="mono" x="560" y="579" fill="#15171C" font-size="20" font-weight="700" text-anchor="middle">−9</text>
<text class="mono" x="612" y="579" fill="#15171C" font-size="20" text-anchor="middle">2</text>
<text class="mono" x="664" y="579" fill="#15171C" font-size="20" text-anchor="middle">−1</text>
<text class="mono" x="716" y="579" fill="#15171C" font-size="20" text-anchor="middle">28</text>
<text class="sans" x="762" y="566" fill="#4A4E57" font-size="13.5">The easiest bar that still got</text>
<text class="sans" x="762" y="585" fill="#4A4E57" font-size="13.5">a side in: 0.0001% of runs.</text>
<rect x="80" y="634" width="6" height="68" fill="#B07D27"/>
<text class="sans" x="100" y="662" fill="#B07D27" font-size="15" font-weight="700">TYPICAL</text>
<text class="sans" x="100" y="682" fill="#7C808A" font-size="12.5">median run</text>
<text class="serif" x="240" y="676" fill="#7C808A" font-size="19" font-style="italic">Median outcome</text>
<text class="mono" x="456" y="675" fill="#15171C" font-size="20" text-anchor="middle">3</text>
<text class="mono" x="508" y="675" fill="#15171C" font-size="20" font-weight="700" text-anchor="middle">3</text>
<text class="mono" x="560" y="675" fill="#15171C" font-size="20" font-weight="700" text-anchor="middle">−1</text>
<text class="mono" x="612" y="675" fill="#15171C" font-size="20" text-anchor="middle">2</text>
<text class="mono" x="664" y="675" fill="#15171C" font-size="20" text-anchor="middle">−4</text>
<text class="mono" x="716" y="675" fill="#15171C" font-size="20" text-anchor="middle">25</text>
<text class="sans" x="762" y="662" fill="#4A4E57" font-size="13.5">The midpoint cut-off across</text>
<text class="sans" x="762" y="681" fill="#4A4E57" font-size="13.5">all simulated tournaments.</text>
<rect x="80" y="730" width="6" height="68" fill="#A23139"/>
<text class="sans" x="100" y="758" fill="#A23139" font-size="15" font-weight="700">HIGHEST</text>
<text class="sans" x="100" y="778" fill="#7C808A" font-size="12.5">hardest bar</text>
<text class="serif" x="240" y="770" fill="#15171C" font-size="22">Algeria</text>
<text class="mono" x="456" y="771" fill="#15171C" font-size="20" text-anchor="middle">3</text>
<text class="mono" x="508" y="771" fill="#15171C" font-size="20" font-weight="700" text-anchor="middle">4</text>
<text class="mono" x="560" y="771" fill="#15171C" font-size="20" font-weight="700" text-anchor="middle">−2</text>
<text class="mono" x="612" y="771" fill="#15171C" font-size="20" text-anchor="middle">6</text>
<text class="mono" x="664" y="771" fill="#15171C" font-size="20" text-anchor="middle">−1</text>
<text class="mono" x="716" y="771" fill="#15171C" font-size="20" text-anchor="middle">28</text>
<text class="sans" x="762" y="758" fill="#4A4E57" font-size="13.5">The hardest bar a side faced</text>
<text class="sans" x="762" y="777" fill="#4A4E57" font-size="13.5">and still made 8th: 0.0004%.</text>
<line x1="80" y1="634" x2="1000" y2="634" stroke="#EFEDE7" stroke-width="1"/>
<line x1="80" y1="730" x2="1000" y2="730" stroke="#EFEDE7" stroke-width="1"/>
<line x1="80" y1="812" x2="1000" y2="812" stroke="#C9C5BA" stroke-width="1.5"/>
<text class="sans" x="80" y="836" fill="#7C808A" font-size="12.5"><tspan fill="#15171C" font-weight="700">P</tspan> played&#160;&#160;&#160;<tspan fill="#15171C" font-weight="700">Pts</tspan> points&#160;&#160;&#160;<tspan fill="#15171C" font-weight="700">GD</tspan> goal difference&#160;&#160;&#160;<tspan fill="#15171C" font-weight="700">GF</tspan> goals for&#160;&#160;&#160;<tspan fill="#15171C" font-weight="700">Con</tspan> conduct score&#160;&#160;&#160;<tspan fill="#15171C" font-weight="700">FIFA</tspan> world ranking</text>
<text class="sans" x="80" y="856" fill="#7C808A" font-size="12.5">Thirds are ranked in turn by points, goal difference, goals scored, conduct score, then FIFA ranking.</text>
<text class="sans" x="80" y="906" fill="#15171C" font-size="15" font-weight="700" letter-spacing="2.5">MOST OFTEN ON THE BUBBLE</text>
<rect x="80" y="916" width="46" height="3" fill="#15171C"/>
<text class="sans" x="80" y="941" fill="#4A4E57" font-size="15">Share of 1,000,000 simulations in which a team finishes 8th, the last side to qualify.</text>
<text class="sans" x="250" y="1024" fill="#15171C" font-size="15" text-anchor="end">South Korea</text>
<rect x="266" y="1006" width="620.0" height="26" fill="#2B3A55"/>
<text class="mono" x="894.0" y="1024" fill="#15171C" font-size="15" font-weight="700">33.3%</text>
<text class="sans" x="250" y="1074" fill="#15171C" font-size="15" text-anchor="end">Scotland</text>
<rect x="266" y="1056" width="299.7" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="573.7" y="1074" fill="#15171C" font-size="15">16.1%</text>
<text class="sans" x="250" y="1124" fill="#15171C" font-size="15" text-anchor="end">Senegal</text>
<rect x="266" y="1106" width="224.2" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="498.2" y="1124" fill="#15171C" font-size="15">12.0%</text>
<text class="sans" x="250" y="1174" fill="#15171C" font-size="15" text-anchor="end">Austria</text>
<rect x="266" y="1156" width="181.1" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="455.1" y="1174" fill="#15171C" font-size="15">9.7%</text>
<text class="sans" x="250" y="1224" fill="#15171C" font-size="15" text-anchor="end">Algeria</text>
<rect x="266" y="1206" width="170.1" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="444.1" y="1224" fill="#15171C" font-size="15">9.1%</text>
<text class="sans" x="250" y="1274" fill="#15171C" font-size="15" text-anchor="end">Croatia</text>
<rect x="266" y="1256" width="113.0" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="387.0" y="1274" fill="#15171C" font-size="15">6.1%</text>
<text class="sans" x="250" y="1324" fill="#15171C" font-size="15" text-anchor="end">Iran</text>
<rect x="266" y="1306" width="58.3" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="332.3" y="1324" fill="#15171C" font-size="15">3.1%</text>
<text class="sans" x="250" y="1374" fill="#15171C" font-size="15" text-anchor="end">Iraq</text>
<rect x="266" y="1356" width="41.0" height="26" fill="#2B3A55" opacity="0.5"/>
<text class="mono" x="315.0" y="1374" fill="#15171C" font-size="15">2.2%</text>
<text class="sans" x="80" y="1410" fill="#7C808A" font-size="12.5">About 8% of eighth-place finishes are spread across other third-placed teams.</text>
<line x1="80" y1="1436" x2="1000" y2="1436" stroke="#E2DFD7" stroke-width="1"/>
<rect x="80" y="1456" width="11" height="11" fill="#A23139"/>
<text class="sans" x="100" y="1466" fill="#15171C" font-size="15" font-weight="700">Provisional: these projections will change once the next round of group fixtures is played.</text>
<text class="sans" x="80" y="1492" fill="#7C808A" font-size="12.5">Method&#160;&#160;&#183;&#160;&#160;1,000,000 Monte-Carlo simulations of the remaining group stage, conditioned on results so far. The cut-off is the 8th-best third-placed team.</text>
<text class="sans" x="80" y="1511" fill="#7C808A" font-size="12.5">Source&#160;&#160;&#183;&#160;&#160;group-stage simulation model</text>
</svg>
