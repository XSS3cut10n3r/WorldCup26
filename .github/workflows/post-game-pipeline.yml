name: Post-game pipeline
on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: post-game-pipeline
  cancel-in-progress: false   # let a running pipeline finish; don't kill it mid-run
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run odds -> elos -> sim and push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -u
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ok=no
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            git fetch -q origin "$BRANCH" || true
            git checkout -q -B "$BRANCH" "origin/$BRANCH" 2>/dev/null || git reset -q --hard "origin/$BRANCH"
            python3 scripts/update_odds.py
            python3 scripts/build_elos.py
            python3 scripts/simulate_pool.py --json sim_odds.json --knockout-json knockout_odds.json --upcoming-json upcoming_odds.json --sims 1000000 --seed 1
            python3 simulate_group_maxmin.py --svg bubble.svg --sims 1000000 --seed 1
            git add odds.json elo.json sim_odds.json knockout_odds.json upcoming_odds.json bubble.svg
            if git diff --staged --quiet; then echo "No changes."; ok=skip; break; fi
            git commit -q -m "Post-game update: odds, elo, pool sim, knockout + upcoming odds, bubble graphic"
            if git push -q origin HEAD:"$BRANCH"; then ok=yes; break; fi
            echo "push rejected (remote moved); resyncing and retrying (${attempt}/5)..."
            sleep 2
          done
          [ "$ok" = no ] && { echo "Could not push after retries."; exit 1; }
          echo "Done ($ok)."
