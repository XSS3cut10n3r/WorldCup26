name: Update scores

on:
  schedule:
    # GitHub may start this late or skip slots entirely — that's fine,
    # because each run loops internally for ~55 minutes, updating scores
    # every 5 minutes. Any single run starting per hour keeps the site
    # fresh. Offset minutes avoid the congested :00/:05/:10 grid.
    - cron: "4-59/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: true   # a newly started run replaces the old loop

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update loop — fetch, commit, sleep, repeat (~55 min)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in $(seq 1 11); do
            echo "--- iteration $i of 11 ---"
            git pull --rebase origin main || true
            python scripts/update_scores.py
            git add data.json
            if git diff --staged --quiet; then
              echo "No score changes."
            else
              git commit -m "Update scores"
              git push || { git pull --rebase origin main && git push; }
            fi
            if [ "$i" -lt 11 ]; then sleep 300; fi
          done
