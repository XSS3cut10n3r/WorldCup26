name: Update scores

on:
  schedule:
    # Every 20 minutes. GitHub may delay scheduled runs by a few minutes.
    # You can tighten this to '*/10 * * * *' during big match days.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch scores and rebuild data.json
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/update_scores.py

      - name: Commit updated data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No score changes."
          else
            git commit -m "Update scores"
            git push
          fi
