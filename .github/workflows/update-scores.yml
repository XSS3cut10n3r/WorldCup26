name: Update scores (live loop)
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      minutes:
        description: "How long to keep polling, in minutes (max 350)"
        required: false
        default: "240"
      interval:
        description: "Seconds to wait between polls"
        required: false
        default: "90"
concurrency:
  group: update-scores-live
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Poll and commit on change
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          RUN_MINUTES: ${{ github.event.inputs.minutes || '240' }}
          POLL_SECONDS: ${{ github.event.inputs.interval || '90' }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -u
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mins="${RUN_MINUTES:-240}"; case "$mins" in (*[!0-9]*|"") mins=240 ;; esac
          [ "$mins" -gt 350 ] && mins=350
          poll="${POLL_SECONDS:-90}"; case "$poll" in (*[!0-9]*|""|0) poll=90 ;; esac
          deadline=$(( $(date +%s) + mins * 60 ))
          echo "Polling every ${poll}s for ${mins} min."
          sig_of() { python3 -c 'import json,hashlib;d=json.load(open("data.json",encoding="utf-8"));d.pop("generated",None);print(hashlib.sha256(json.dumps(d,sort_keys=True,ensure_ascii=False).encode("utf-8")).hexdigest())' 2>/dev/null; }
          resync() {
            git rebase --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            git fetch -q origin "$BRANCH" || true
            git checkout -q -B "$BRANCH" "origin/$BRANCH" 2>/dev/null || git reset -q --hard "origin/$BRANCH"
          }
          prev_sig=""
          while [ "$(date +%s)" -lt "$deadline" ]; do
            resync
            if python3 scripts/update_scores.py; then
              sig="$(sig_of)"
              if git diff --quiet -- data.json; then
                echo "$(date -u '+%H:%M:%SZ') — no change."
              elif [ -n "$sig" ] && [ "$sig" = "$prev_sig" ]; then
                git add data.json
                git commit -q -m "Live scores: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                if git push -q origin HEAD:"$BRANCH"; then
                  echo "Pushed an update."
                else
                  done_state=fail
                  for attempt in 1 2 3 4; do
                    resync
                    python3 scripts/update_scores.py || true
                    if git diff --quiet -- data.json; then done_state=current; break; fi
                    git add data.json
                    git commit -q -m "Live scores: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
                    if git push -q origin HEAD:"$BRANCH"; then done_state=ok; break; fi
                    sleep 2
                  done
                  case "$done_state" in
                    ok) echo "Pushed an update (after resync)." ;;
                    current) echo "Remote already current." ;;
                    *) echo "Push failed after retries; will retry next poll." ;;
                  esac
                fi
              else
                echo "$(date -u '+%H:%M:%SZ') — change seen, holding one poll (anti-flap)."
              fi
              prev_sig="$sig"
            else
              echo "Update script failed this cycle (transient API issue?); retrying next poll."
            fi
            sleep "$poll"
          done
          echo "Live window finished."
