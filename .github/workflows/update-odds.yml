name: Update odds
on:
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: update-odds
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch Kalshi odds and push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -u
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ok=no
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            git fetch -q origin "$BRANCH" || true
            git checkout -q -B "$BRANCH" "origin/$BRANCH" 2>/dev/null || git reset -q --hard "origin/$BRANCH"
            python3 scripts/update_odds.py
            git add odds.json; [ -f elo.json ] && git add elo.json
            if git diff --staged --quiet; then echo "No changes."; ok=skip; break; fi
            git commit -q -m "Update odds"
            if git push -q origin HEAD:"$BRANCH"; then ok=yes; break; fi
            echo "push rejected (remote moved); resyncing and retrying (${attempt}/5)…"
            sleep 2
          done
          [ "$ok" = no ] && { echo "Could not push after retries."; exit 1; }
          echo "Done ($ok)."
