name: Rebuild Elo ratings
on:
  workflow_dispatch: {}
  # Re-anchor automatically whenever results change. workflow_run fires even
  # though "Update scores" pushed with GITHUB_TOKEN (a push trigger would not).
  workflow_run:
    workflows: ["Update scores"]
    types: [completed]
  # Optional belt-and-suspenders during the tournament — uncomment to also
  # rebuild a couple of times a day regardless:
  # schedule:
  #   - cron: "0 6,18 * * *"
permissions:
  contents: write
concurrency:
  group: rebuild-elos
  cancel-in-progress: true
jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # For workflow_run, only proceed if the scores run actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On a workflow_run trigger github.ref_name is the default branch;
          # prefer the branch the upstream run was on.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rebuild elo.json and push
        env:
          BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
        run: |
          set -u
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ok=no
          for attempt in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            rm -rf .git/rebase-merge .git/rebase-apply 2>/dev/null || true
            git fetch -q origin "$BRANCH" || true
            git checkout -q -B "$BRANCH" "origin/$BRANCH" 2>/dev/null || git reset -q --hard "origin/$BRANCH"
            python3 scripts/build_elos.py
            git add elo.json
            if git diff --staged --quiet; then echo "No ratings changes."; ok=skip; break; fi
            git commit -q -m "Rebuild Elo ratings"
            if git push -q origin HEAD:"$BRANCH"; then ok=yes; break; fi
            echo "push rejected (remote moved); resyncing and retrying (${attempt}/5)…"
            sleep 2
          done
          [ "$ok" = no ] && { echo "Could not push after retries."; exit 1; }
          echo "Done ($ok)."
