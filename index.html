    </div>`);

    // Qualification & tiebreak rulebook: large, clear, highlighted
    html += section("How third place is decided", `<div class="rulebook">
      <h3>How will the best third-place teams be determined?</h3>
      <p>Similar to the group tiebreakers, the third-placed teams in the group stage
         will be ranked by these criteria, <mark>in order</mark>:</p>
      <ol class="criteria">
        <li>Points</li>
        <li>Goal difference</li>
        <li>Goals scored</li>
        <li>Team conduct score</li>
        <li>FIFA world ranking</li>
      </ol>
      <h3>How is team conduct score calculated?</h3>
      <p>Yellow cards and red cards accumulated are the two elements used to calculate
         this, with cards issued to <mark>both players and team officials</mark> contributing
         to the score.</p>
      <ul class="cardpts">
        <li><span class="v">&minus;1</span> Yellow card</li>
        <li><span class="v">&minus;3</span> Indirect red card (resulting from a second yellow card)</li>
        <li><span class="v">&minus;4</span> Direct red card</li>
        <li><span class="v">&minus;5</span> Yellow card and direct red card</li>
      </ul>
    </div>`);

    return html;
  }

  // ===== Knockout bracket: meet-in-the-middle, round toggles, connector lines =====
  // Static FIFA 2026 feed map: match number -> [home feeder, away feeder].
  const BKT_FEED = {89:[74,77],90:[73,75],91:[76,78],92:[79,80],93:[83,84],94:[81,82],
    95:[86,88],96:[85,87],97:[89,90],98:[93,94],99:[91,92],100:[95,96],
    101:[97,98],102:[99,100],104:[101,102]};
  const BKT_RND = {LAST_32:"R32",LAST_16:"R16",QUARTER_FINALS:"QF",SEMI_FINALS:"SF",FINAL:"F",THIRD_PLACE:"T"};
  const BKT_COLR = ["R32","R16","QF","SF","F","SF","QF","R16","R32"];
  let bktActive = "R32", BKT = null, bktResizeBound = false;

  // Build the bracket tree: vertical unit + side (L/R/C) for every match.
  function bktTree() {
    const unit = {}, side = {}, cnt = {L:0, R:0};
    function rec(no, sd) {
      side[no] = sd;
      const f = BKT_FEED[no];
      if (!f) { unit[no] = cnt[sd]++; return unit[no]; }   // leaf (R32)
      const a = rec(f[0], sd), b = rec(f[1], sd);
      unit[no] = (a + b) / 2;                               // parent = midpoint of children
      return unit[no];
    }
    const ff = BKT_FEED[104];
    rec(ff[0], "L"); rec(ff[1], "R");
    unit[104] = 3.5; side[104] = "C";
    unit[103] = 3.5; side[103] = "C";
    return {unit, side};
  }
  function bktColOf(round, sd) {
    const L = sd === "L";
    if (round === "R32") return L ? 0 : 8;
    if (round === "R16") return L ? 1 : 7;
    if (round === "QF")  return L ? 2 : 6;
    if (round === "SF")  return L ? 3 : 5;
    return 4; // F, T
  }

  function bktLine(t, sideKey, m, full) {
    const live = m.status === "IN_PLAY" || m.status === "PAUSED";
    const done = m.status === "FINISHED" || m.status === "AWARDED";
    let cls = t.projected ? "projd" : (!t.resolved ? "unres" : "");
    if (done && m.winner && m.winner !== "DRAW") {
      const won = (m.winner === "HOME_TEAM") === (sideKey === "home");
      cls = won ? "winner" : "loser";
    }
    // On the bracket each team is on its own line, so the shootout score sits
    // right beside that team's regulation goals, e.g. 1(3).
    const showPen = m.penalties && t.penGoals !== null && t.penGoals !== undefined;
    const goals = (done || live) && t.goals !== null && t.goals !== undefined
      ? `<span class="bsc">${t.goals}${showPen ? ` <span class="bpen">(${t.penGoals})</span>` : ""}</span>` : "";
    const name = t.resolved ? esc(t.name) : esc(t.slot);
    let sub = "";
    if (full) {
      const parts = [];
      if (t.resolved) parts.push(esc(t.slot));
      if (t.owner) parts.push(esc(t.owner));
      sub = parts.join(" &middot; ");
    }
    return `<div class="bline ${cls}"><span class="bn">${name}</span>` +
      (sub ? `<span class="bsub">${sub}</span>` : "") + goals + `</div>`;
  }
  function bktMeta(m) {
    const live = m.status === "IN_PLAY" || m.status === "PAUSED";
    const done = m.status === "FINISHED" || m.status === "AWARDED";
    const meta = live ? '<span class="live-dot"></span> Live'
      : done ? (m.penalties ? "FT &middot; Pens" : "FT")
      : (m.utcDate ? esc(fmtKick(m.utcDate)) : "Date TBC");
    return `M${m.matchNo ?? ""} &middot; ${meta}`;
  }
  function bktContent(m, full) {
    let h = bktLine(m.home, "home", m, full) + bktLine(m.away, "away", m, full);
    if (full) h += `<div class="bmeta2">${bktMeta(m)}</div>`;
    return h;
  }

  function bktRectC(no) {
    const el = document.getElementById("bkt-box-" + no); if (!el) return null;
    const b = document.getElementById("bkt-stage").getBoundingClientRect();
    const r = el.getBoundingClientRect();
    return {l: r.left - b.left, r: r.right - b.left, cy: (r.top + r.bottom) / 2 - b.top};
  }
  function bktPath(con) {
    const p = bktRectC(con.p); if (!p) return "";
    const cs = con.c.map(bktRectC).filter(Boolean); if (!cs.length) return "";
    if (con.single) {
      const c = cs[0];
      if (con.side === "L") { const cx = c.r, px = p.l, m = (cx + px) / 2; return "M" + cx + " " + c.cy + "H" + m + "V" + p.cy + "H" + px; }
      const cx = c.l, px = p.r, m = (cx + px) / 2; return "M" + cx + " " + c.cy + "H" + m + "V" + p.cy + "H" + px;
    }
    if (cs.length < 2) return "";
    if (con.side === "L") { const cx = cs[0].r, px = p.l, m = (cx + px) / 2;
      return "M" + cx + " " + cs[0].cy + "H" + m + "M" + cs[1].r + " " + cs[1].cy + "H" + m + "M" + m + " " + cs[0].cy + "V" + cs[1].cy + "M" + m + " " + p.cy + "H" + px; }
    const cx = cs[0].l, px = p.r, m = (cx + px) / 2;
    return "M" + cx + " " + cs[0].cy + "H" + m + "M" + cs[1].l + " " + cs[1].cy + "H" + m + "M" + m + " " + cs[0].cy + "V" + cs[1].cy + "M" + m + " " + p.cy + "H" + px;
  }
  function bktDraw() {
    const stage = document.getElementById("bkt-stage"); if (!stage || !BKT) return;
    const W = stage.clientWidth, H = stage.scrollHeight || stage.clientHeight;
    const svg = document.getElementById("bkt-links");
    svg.setAttribute("viewBox", "0 0 " + W + " " + H); svg.style.height = H + "px";
    let base = "", hot = "";
    BKT.conns.forEach(c => { const d = bktPath(c); if (!d) return;
      (c.pr === bktActive || c.cr === bktActive) ? hot += d : base += d; });
    const lb = document.getElementById("bkt-base"), lh = document.getElementById("bkt-hot");
    lb.setAttribute("d", base); lb.setAttribute("stroke", "rgba(242,240,228,.20)"); lb.setAttribute("stroke-width", "1.3");
    lh.setAttribute("d", hot); lh.setAttribute("stroke", "#E8C34A"); lh.setAttribute("stroke-width", "2"); lh.setAttribute("stroke-opacity", ".92");
  }

  function bktRenderStage(animate) {
    const stage = document.getElementById("bkt-stage"); if (!stage || !BKT) return;
    document.getElementById("bkt-list").style.display = "none"; stage.style.display = "";
    const W = stage.clientWidth;
    // Cap the popped round's columns so they don't stretch into dead space;
    // give the freed width to the other rounds so the later stages read bigger.
    const ACTIVE_MAX = 320, INACTIVE_MIN = 92;
    const nA = BKT_COLR.filter(r => r === bktActive).length;
    let aw = Math.min(ACTIVE_MAX, (W - (9 - nA) * INACTIVE_MIN) / nA);
    aw = Math.max(aw, 150);
    const iw = (W - aw * nA) / (9 - nA);
    const colX = [], colW = []; let x = 0;
    BKT_COLR.forEach((r, c) => { colW[c] = (r === bktActive ? aw : iw); colX[c] = x; x += colW[c]; });
    const activeH = 72, smallH = 30, vgap = 7;
    const spacing = {R32:1, R16:2, QF:4, SF:8, F:8}[bktActive] || 8;
    const unitH = Math.max(smallH + vgap, (activeH + vgap) / spacing);
    const H = 8 * unitH; stage.style.height = H + "px";
    const isOn = round => round === bktActive || (bktActive === "F" && round === "T");
    Object.keys(BKT.byNo).forEach(k => {
      const no = +k, info = BKT.byNo[no], round = info.round;
      const el = document.getElementById("bkt-box-" + no); if (!el) return;
      const on = isOn(round), bh = on ? activeH : smallH;
      el.classList.toggle("on", on);
      el.innerHTML = bktContent(info.m, on);
      el.style.height = bh + "px";
      if (round === "F" || round === "T") {
        const fH = isOn("F") ? activeH : smallH, gapC = bktActive === "F" ? 14 : 8;
        const ctr = H / 2;
        el.style.left = (colX[4] + 5) + "px"; el.style.width = (colW[4] - 10) + "px";
        el.style.top = (round === "F" ? ctr - fH / 2 : ctr + fH / 2 + gapC) + "px";
      } else {
        const sd = BKT.tree.side[no], col = bktColOf(round, sd);
        const cy = (BKT.tree.unit[no] + 0.5) * unitH;
        el.style.left = (colX[col] + 5) + "px"; el.style.width = (colW[col] - 10) + "px";
        el.style.top = (cy - bh / 2) + "px";
      }
    });
    bktDraw();
    if (animate) { const t0 = performance.now(); (function f(){ bktDraw(); if (performance.now() - t0 < 580) requestAnimationFrame(f); })(); }
  }
  function bktRenderList() {
    const stage = document.getElementById("bkt-stage"), list = document.getElementById("bkt-list");
    if (!stage || !list || !BKT) return;
    stage.style.display = "none"; list.style.display = "block";
    let nos = Object.keys(BKT.byNo).map(Number).filter(no => {
      const r = BKT.byNo[no].round; return r === bktActive || (bktActive === "F" && r === "T");
    });
    nos.sort((a, b) => a - b);
    if (bktActive === "F") nos = [104, 103].filter(no => BKT.byNo[no]);
    list.innerHTML = nos.map(no => `<div class="lcard">${bktContent(BKT.byNo[no].m, true)}</div>`).join("");
  }
  function bktLayout(animate) {
    if (!BKT) return;
    (window.innerWidth < 600) ? bktRenderList() : bktRenderStage(animate);
  }
  function bktSyncTabs() {
    document.querySelectorAll("#bkt-tabs button").forEach(b => b.classList.toggle("active", b.dataset.r === bktActive));
  }
  function mountBracket(data) {
    const stage = document.getElementById("bkt-stage"); if (!stage) return;
    const rounds = data.bracket || [];
    const byNo = {};
    rounds.forEach(r => r.matches.forEach(m => { byNo[m.matchNo] = {m, round: BKT_RND[r.stageCode] || "?"}; }));
    const tree = bktTree();
    const conns = [];
    Object.keys(BKT_FEED).forEach(k => { const no = +k; if (no === 104) return;
      conns.push({p: no, c: BKT_FEED[no], side: tree.side[no],
        pr: (byNo[no] || {}).round, cr: (byNo[BKT_FEED[no][0]] || {}).round}); });
    conns.push({p: 104, c: [101], side: "L", single: true, pr: "F", cr: "SF"});
    conns.push({p: 104, c: [102], side: "R", single: true, pr: "F", cr: "SF"});
    BKT = {data, byNo, tree, conns};
    [...stage.querySelectorAll(".bkt-box")].forEach(e => e.remove());
    Object.keys(byNo).forEach(no => { const d = document.createElement("div");
      d.className = "bkt-box"; d.id = "bkt-box-" + no; stage.appendChild(d); });
    document.querySelectorAll("#bkt-tabs button").forEach(b => {
      b.onclick = () => { bktActive = b.dataset.r; bktSyncTabs(); bktLayout(true); };
    });
    bktSyncTabs();
    if (!bktResizeBound) { bktResizeBound = true; let rt;
      window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(() => bktLayout(false), 140); }); }
    bktLayout(false);
  }

  function renderBracket(data) {
    const rounds = (data.bracket || []);
    if (!rounds.length) {
      return section("Knockout bracket",
        `<div class="empty">The bracket appears here once tournament data loads.</div>`);
    }
    const anyProjected = rounds.some(r => r.matches.some(m => m.home.projected || m.away.projected));
    const note = anyProjected
      ? `<p class="gnote"><i>Italic teams are projected from the current standings</i> —
         they update after every group game and lock in as groups finish. Third-place slots
         follow FIFA's official allocation table (Annex C), so this is the real bracket if the
         groups ended today.</p>`
      : "";
    return `<section class="bkt-section">
      <div class="section-head"><h2>Knockout bracket</h2></div>
      ${note}
      <div class="bkt-tabs" id="bkt-tabs">
        <button data-r="R32">Round of 32</button>
        <button data-r="R16">Round of 16</button>
        <button data-r="QF">Quarter-finals</button>
        <button data-r="SF">Semi-finals</button>
        <button data-r="F">Final</button>
      </div>
      <div class="bkt-stage" id="bkt-stage"><svg class="bkt-links" id="bkt-links"><path id="bkt-base" fill="none"></path><path id="bkt-hot" fill="none"></path></svg></div>
      <div class="bkt-list" id="bkt-list"></div>
    </section>`;
  }


  function renderConduct(data) {
    const cd = data.conduct || {};
    const people = cd.people || [];
    const teams = cd.teams || [];
    if (!people.length && !teams.length) {
      return section("Conduct", `<div class="empty">Conduct data appears here
        once card counts are entered in <b>cards-manual.json</b>.</div>`);
    }
    let html = "";

    // Worst conduct: same look as the main standings, inverted honor
    const rows = people.map(p => {
      const chips = p.teams.map(t =>
        `<span class="chip">${esc(t.name)} <b>${t.score}</b></span>`).join("");
      return `<div class="row ${p.rank === 1 && p.score < 0 ? "leader" : ""}">
        <div class="rank">${p.rank}</div>
        <div class="who"><div class="name">${esc(p.name)}</div><div class="teams">${chips}</div></div>
        <div class="pts">${p.score}<small>card pts</small></div>
      </div>`;
    }).join("");
    html += section("Worst conduct", `
      <p class="gnote">Every card your teams collect counts against you.
      Rank 1 holds the family's dirtiest squad list: wear it proudly.</p>
      <div class="board">${rows}</div>`);

    // Full team table
    if (teams.length) {
      const ctrs = teams.map(t =>
        `<tr>
          <td class="gpos">${t.rank}</td>
          <td class="gteam">${esc(t.team)}${t.owner ? `<span class="gowner">${esc(t.owner)}</span>` : ""}</td>
          <td>${t.yellow}</td><td>${t.indirect_red}</td><td>${t.direct_red}</td>
          <td>${t.yellow_direct_red}</td><td class="gpts">${t.score}</td>
        </tr>`).join("");
      html += section("Team conduct score", `
        <p class="gnote">Best-behaved teams first: this is tiebreaker #4 in the
        best-third-place race on the Groups page. Yellow &minus;1 &middot;
        second-yellow red &minus;3 &middot; straight red &minus;4 &middot;
        yellow then straight red &minus;5. Cards issued to players and team
        officials both count.</p>
        <div class="gtable-wrap"><table class="gtable">
          <thead><tr><th></th><th class="l">Team</th><th>Y</th><th>2Y&rarr;R</th><th>R</th><th>Y+R</th><th>Score</th></tr></thead>
          <tbody>${ctrs}</tbody></table></div>
        ${cd.hasData ? "" :
          `<p class="gnote">No cards entered yet: totals update when
           <b>cards-manual.json</b> in the repository is edited.</p>`}`);
    }
    return html;
  }

  function renderOdds(data) {
    if (!oddsData || !(oddsData.standings || []).length) {
      return section("Odds to win the Cup", `<div class="empty">Championship odds
        appear here once the <b>Update odds</b> workflow has run. Trigger it from
        the repository's Actions tab, then refresh.</div>`);
    }
    // Reuse the battle-tested elimination flags from data.json: both files
    // key teams by the exact assignments.json spelling, so names line up.
    const elim = new Set();
    ((data && data.leaderboard) || []).forEach(p =>
      (p.teams || []).forEach(t => { if (t.eliminated) elim.add(t.name); }));

    const rows = (oddsData.standings || []).map(r => {
      const chips = r.teams.map(t => {
        const out = elim.has(t.name);
        return `<span class="chip ${out ? "out" : ""}">${esc(t.name)} <b>${fmtPct(out ? 0 : t.odds)}</b></span>`;
      }).join("");
      return `<div class="row ${r.rank === 1 && r.odds > 0 ? "leader" : ""}">
        <div class="rank">${r.rank}</div>
        <div class="who"><div class="name">${esc(r.name)}</div><div class="teams">${chips}</div></div>
        <div class="pts">${(r.odds * 100).toFixed(1)}%<small>to win</small>${fmtDelta(r.delta)}</div>
      </div>`;
    }).join("");

    const note = `<p class="gnote">Live championship odds from <b>Kalshi</b>,
      normalized to 100% (the market's built-in margin removed). Each person's
      figure is the combined chance that <i>one of their teams</i> lifts the
      trophy: the chips show each team's individual odds, and the
      <span style="color:var(--up)">▲</span>/<span style="color:var(--live)">▼</span>
      is their change since the last update. Knocked-out teams are struck through.</p>`;
    return section("Odds to win the Cup", note + `<div class="board">${rows}</div>`);
  }

  // ---------- Tab switching with hash routing ----------
  let view = ["groups", "bracket", "conduct", "odds"].includes(location.hash.slice(1))
    ? location.hash.slice(1) : "home";
  let lastData = null;
  let oddsData = null;

  // ---------- Simulate remaining games (client-side what-if) ----------
  let simMode = false, simData = null;
  const currentData = () => (simMode && simData) ? simData : lastData;

  const SIM_STAGE_LABEL = {GROUP_STAGE:"Group stage", LAST_32:"Round of 32",
    LAST_16:"Round of 16", QUARTER_FINALS:"Quarter-final", SEMI_FINALS:"Semi-final",
    THIRD_PLACE:"Third-place match", FINAL:"Final"};
  const SIM_ROUND_STAGE = {r32:"LAST_32", r16:"LAST_16", qf:"QUARTER_FINALS",
    sf:"SEMI_FINALS", final:"FINAL", third:"THIRD_PLACE"};

  function simGoals() {
    const r = Math.random();
    return r < 0.20 ? 0 : r < 0.48 ? 1 : r < 0.73 ? 2 : r < 0.89 ? 3 : r < 0.97 ? 4 : 5;
  }
  function simStagePts(scoring, stageCode, isDraw) {
    if (stageCode === "GROUP_STAGE")
      return isDraw ? (scoring.GROUP_STAGE_DRAW || 0) : (scoring.GROUP_STAGE_WIN || 0);
    return scoring[stageCode] || 0;
  }

  // Recursive 2026 group ranking (mirrors the Python rank_group): head-to-head
  // points/GD/goals among the tied teams first (re-applied to each still-tied
  // subgroup), then overall GD, goals, conduct, FIFA rank.
  function simRankGroup(teams, results) {
    const cmp = (a, b) => { for (let i = 0; i < a.length; i++) {
      if (a[i] < b[i]) return -1; if (a[i] > b[i]) return 1; } return 0; };
    const overallKey = r => [-r.gd, -r.gf, -(r.conduct || 0),
      (r.fifa == null ? 999 : r.fifa), r.team];
    function resolve(group) {
      if (group.length === 1) return group.slice();
      const names = new Set(group.map(r => r.team));
      const h = {}; group.forEach(r => h[r.team] = {pts: 0, gf: 0, ga: 0});
      results.forEach(m => { if (names.has(m.h) && names.has(m.a)) {
        h[m.h].gf += m.hg; h[m.h].ga += m.ag; h[m.a].gf += m.ag; h[m.a].ga += m.hg;
        if (m.hg > m.ag) h[m.h].pts += 3; else if (m.hg < m.ag) h[m.a].pts += 3;
        else { h[m.h].pts++; h[m.a].pts++; } } });
      const hk = r => [-h[r.team].pts, -(h[r.team].gf - h[r.team].ga), -h[r.team].gf];
      const ordered = group.slice().sort((x, y) => cmp(hk(x), hk(y)));
      const blocks = [];
      ordered.forEach(r => { if (blocks.length &&
        cmp(hk(r), hk(blocks[blocks.length - 1][0])) === 0)
        blocks[blocks.length - 1].push(r); else blocks.push([r]); });
      if (blocks.length === 1)
        return group.slice().sort((x, y) => cmp(overallKey(x), overallKey(y)));
      let out = []; blocks.forEach(b => out = out.concat(resolve(b))); return out;
    }
    const byPts = teams.slice().sort((a, b) => b.points - a.points);
    let ranked = [], i = 0;
    while (i < byPts.length) { let j = i;
      while (j < byPts.length && byPts[j].points === byPts[i].points) j++;
      ranked = ranked.concat(resolve(byPts.slice(i, j))); i = j; }
    return ranked;
  }

  function buildSimData(data) {
    const sim = data.sim, sc = sim.scoring, T = sim.teams;
    const info = nm => T[nm] || {owner: null, canon: null, conduct: 0, fifa: null};
    const round1 = n => Math.round(n * 10) / 10;

    // 1) Group tables (current results + random scorelines for what's left).
    const simGroupGames = [];
    const groupTables = [];
    Object.keys(sim.groupsDef).forEach(letter => {
      const names = sim.groupsDef[letter];
      const rec = {}; names.forEach(t => rec[t] = {p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
      const allRes = [];
      const apply = (hn, an, hg, ag) => { allRes.push({h:hn,a:an,hg,ag});
        [[hn,hg,ag],[an,ag,hg]].forEach(([t,gf,ga]) => { const r = rec[t];
          r.p++; r.gf += gf; r.ga += ga;
          if (gf > ga) { r.w++; r.pts += 3; } else if (gf === ga) { r.d++; r.pts++; } else r.l++; }); };
      (sim.groupResults[letter] || []).forEach(m => apply(m.h, m.a, m.hg, m.ag));
      (sim.groupRemaining[letter] || []).forEach(m => {
        const hg = simGoals(), ag = simGoals();
        apply(m.h, m.a, hg, ag); simGroupGames.push({h:m.h, a:m.a, hg, ag}); });
      const rows = names.map(t => ({team:t, owner:info(t).owner,
        played:rec[t].p, won:rec[t].w, draw:rec[t].d, lost:rec[t].l,
        gf:rec[t].gf, ga:rec[t].ga, gd:rec[t].gf - rec[t].ga, points:rec[t].pts,
        conduct:info(t).conduct, fifa:info(t).fifa}));
      const ranked = simRankGroup(rows, allRes);
      ranked.forEach((r, i) => { r.pos = i + 1; r.clinched = false; r.clinchType = null;
        if (r.pos === 1) { r.clinched = true; r.clinchType = "winner"; }
        else if (r.pos === 2) { r.clinched = true; r.clinchType = "second"; } });
      groupTables.push({letter, rows: ranked});
    });

    // 2) Best third-place race (top eight qualify).
    const thirds = groupTables.map(g => {
      const t = Object.assign({}, g.rows.find(r => r.pos === 3));
      t.group = "Group " + g.letter; return t; });
    thirds.sort((a, b) => {
      const ka = [-a.points, -a.gd, -a.gf, -(a.conduct||0), (a.fifa==null?999:a.fifa)];
      const kb = [-b.points, -b.gd, -b.gf, -(b.conduct||0), (b.fifa==null?999:b.fifa)];
      for (let i = 0; i < ka.length; i++) if (ka[i] !== kb[i]) return ka[i] - kb[i];
      return a.team < b.team ? -1 : (a.team > b.team ? 1 : 0); });
    thirds.forEach((t, i) => { t.rank = i + 1; t.qualifies = i < 8; });
    thirds.forEach(t => { if (!t.qualifies) return;
      const letter = t.group.split(" ").pop();
      const row = groupTables.find(g => g.letter === letter).rows.find(r => r.pos === 3);
      row.clinched = true; row.clinchType = "third"; });

    // 3) Knockout bracket, simulated forward (real results kept where played).
    const winners = {}, runners = {};
    groupTables.forEach(g => { winners[g.letter] = g.rows.find(r => r.pos === 1);
      runners[g.letter] = g.rows.find(r => r.pos === 2); });
    const qual = thirds.filter(t => t.qualifies);
    const combo = qual.map(t => t.group.split(" ").pop()).sort().join("");
    const tmpl = sim.template;
    const assignment = (tmpl.thirdAllocation || {})[combo];
    const thirdBySlot = {};
    if (assignment && tmpl.thirdSlots) {
      const byG = {}; qual.forEach(t => byG[t.group.split(" ").pop()] = t);
      tmpl.thirdSlots.forEach((slot, i) => thirdBySlot[slot] = byG[assignment[i]]);
    } else { (tmpl.thirdSlots || []).forEach((slot, i) => thirdBySlot[slot] = qual[i]); }

    const results = {}, simKOGames = [], eliminated = new Set(), bracketByStage = {};
    const sideFromCode = (code, md) => {
      if (code[0] === "1" || code[0] === "2") {
        const w = code[0] === "1" ? winners[code[1]] : runners[code[1]];
        const label = (code[0] === "1" ? "Winner Group " : "Runner-up Group ") + code[1];
        return w ? {name:w.team, owner:w.owner, fifa:w.fifa, slot:label} : null;
      }
      if (code.slice(0, 2) === "T:") {
        const w = thirdBySlot[md.home[1]];
        const label = "3rd place " + code.slice(2).split("").join("/");
        return w ? {name:w.team, owner:w.owner, fifa:w.fifa, slot:label} : null;
      }
      const ref = parseInt(code.slice(1), 10), res = results[ref];
      const label = (code[0] === "W" ? "Winner" : "Loser") + " match " + ref;
      if (res) { const s = code[0] === "W" ? res.winner : res.loser;
        return {name:s.name, owner:s.owner, fifa:s.fifa, slot:label}; }
      return null;
    };
    const findReal = (hn, an, stageCode) => (sim.knockoutPlayed || []).find(k =>
      k.stageCode === stageCode &&
      ((k.home === hn && k.away === an) || (k.home === an && k.away === hn)));

    const defs = [];
    Object.keys(SIM_ROUND_STAGE).forEach(key =>
      (tmpl[key] || []).forEach(md => defs.push({md, stageCode: SIM_ROUND_STAGE[key]})));
    defs.sort((a, b) => a.md.match - b.md.match);

    defs.forEach(({md, stageCode}) => {
      bracketByStage[stageCode] = bracketByStage[stageCode] || [];
      const home = sideFromCode(md.home, md), away = sideFromCode(md.away, md);
      let entry;
      if (home && away) {
        let hg, ag, pens = false, ph = null, pa = null, winSide;
        const real = findReal(home.name, away.name, stageCode);
        if (real && real.winner) {
          const sameHome = real.home === home.name;
          hg = sameHome ? real.homeGoals : real.awayGoals;
          ag = sameHome ? real.awayGoals : real.homeGoals;
          ph = sameHome ? real.penHome : real.penAway;
          pa = sameHome ? real.penAway : real.penHome;
          pens = real.penalties;
          winSide = real.winner === "DRAW" ? null
            : (sameHome ? real.winner
               : (real.winner === "HOME_TEAM" ? "AWAY_TEAM" : "HOME_TEAM"));
        } else {
          hg = simGoals(); ag = simGoals();
          if (hg === ag) { pens = true; const hw = Math.random() < 0.5;
            ph = hw ? 5 : 4; pa = hw ? 4 : 5; winSide = hw ? "HOME_TEAM" : "AWAY_TEAM"; }
          else winSide = hg > ag ? "HOME_TEAM" : "AWAY_TEAM";
          simKOGames.push({stageCode, winnerName: (winSide === "HOME_TEAM" ? home : away).name});
        }
        const win = winSide === "HOME_TEAM" ? home : away;
        const lose = winSide === "HOME_TEAM" ? away : home;
        results[md.match] = {
          winner: {name:win.name, owner:win.owner, fifa:win.fifa},
          loser: {name:lose.name, owner:lose.owner, fifa:lose.fifa}};
        if (stageCode !== "THIRD_PLACE") eliminated.add(lose.name);
        entry = {matchNo: md.match, stage: SIM_STAGE_LABEL[stageCode], stageCode,
          status: "FINISHED", utcDate: null, penalties: pens, winner: winSide,
          home: {name:home.name, owner:home.owner, goals:hg, penGoals:ph,
                 projected:false, slot:home.slot, resolved:true, fifaRank:home.fifa ?? null},
          away: {name:away.name, owner:away.owner, goals:ag, penGoals:pa,
                 projected:false, slot:away.slot, resolved:true, fifaRank:away.fifa ?? null}};
      } else {
        const blank = s => ({name:"TBD", owner:null, goals:null, penGoals:null,
          projected:false, slot:(s && s.slot) || "TBD", resolved:false, fifaRank:null});
        entry = {matchNo: md.match, stage: SIM_STAGE_LABEL[stageCode], stageCode,
          status: "SCHEDULED", utcDate: null, penalties: false, winner: null,
          home: blank(home), away: blank(away)};
      }
      bracketByStage[stageCode].push(entry);
    });

    const order = ["LAST_32","LAST_16","QUARTER_FINALS","SEMI_FINALS","FINAL","THIRD_PLACE"];
    const bracketOut = order.filter(s => (bracketByStage[s] || []).length).map(s => ({
      stage: SIM_STAGE_LABEL[s], stageCode: s,
      matches: bracketByStage[s].sort((a, b) => a.matchNo - b.matchNo)}));

    // 4) Leaderboard: live points as a baseline, plus the simulated deltas.
    const personPts = {}, teamPts = {};
    data.leaderboard.forEach(p => { personPts[p.name] = p.points;
      p.teams.forEach(t => teamPts[t.name] = t.points); });
    const award = (canon, owner, pts) => { if (!pts) return;
      if (owner != null) personPts[owner] = (personPts[owner] || 0) + pts;
      if (canon != null) teamPts[canon] = (teamPts[canon] || 0) + pts; };
    simGroupGames.forEach(g => { const hi = info(g.h), ai = info(g.a);
      if (g.hg > g.ag) award(hi.canon, hi.owner, simStagePts(sc, "GROUP_STAGE", false));
      else if (g.hg < g.ag) award(ai.canon, ai.owner, simStagePts(sc, "GROUP_STAGE", false));
      else { award(hi.canon, hi.owner, simStagePts(sc, "GROUP_STAGE", true));
             award(ai.canon, ai.owner, simStagePts(sc, "GROUP_STAGE", true)); } });
    simKOGames.forEach(g => { const wi = info(g.winnerName);
      award(wi.canon, wi.owner, simStagePts(sc, g.stageCode, false)); });

    const elimCanon = new Set(), clinchCanon = {};
    groupTables.forEach(g => g.rows.forEach(r => { const ci = info(r.team).canon;
      if (!ci) return;
      if (r.pos === 4 || (r.pos === 3 && !r.clinched)) elimCanon.add(ci);
      if (r.clinched) clinchCanon[ci] = r.clinchType; }));
    eliminated.forEach(nm => { const ci = info(nm).canon; if (ci) elimCanon.add(ci); });

    const lb = data.leaderboard.map(p => ({
      name: p.name, points: round1(personPts[p.name] ?? p.points),
      teams: p.teams.map(t => ({
        name: t.name, points: round1(teamPts[t.name] ?? t.points),
        eliminated: elimCanon.has(t.name),
        clinched: Object.prototype.hasOwnProperty.call(clinchCanon, t.name),
        clinchType: clinchCanon[t.name] ?? null}))}));
    lb.sort((a, b) => b.points - a.points ||
      a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
    let rk = 0, prev = null;
    lb.forEach((row, i) => { if (row.points !== prev) { rk = i + 1; prev = row.points; }
      row.rank = rk; });

    // 5) Group + third-place output shapes the renderers expect.
    const groupsOut = groupTables.map(g => ({
      group: "Group " + g.letter, ranked: true,
      table: g.rows.map(r => ({pos:r.pos, team:r.team, owner:r.owner,
        played:r.played, won:r.won, draw:r.draw, lost:r.lost, gf:r.gf, ga:r.ga,
        gd:r.gd, points:r.points, conduct:r.conduct, fifaRank:r.fifa,
        clinched:!!r.clinched, clinchType:r.clinchType || null}))}));
    const thirdOut = thirds.map(t => ({rank:t.rank, team:t.team, group:t.group,
      owner:t.owner, played:t.played, points:t.points, gd:t.gd, gf:t.gf,
      conduct:t.conduct, fifaRank:t.fifa, qualifies:t.qualifies,
      clinched:t.qualifies, clinchType: t.qualifies ? "third" : null}));

    // 6) Home-page extras kept coherent (no live games, nothing upcoming).
    const recent = (bracketByStage.FINAL || [])
      .concat(bracketByStage.THIRD_PLACE || [], bracketByStage.SEMI_FINALS || [])
      .slice(0, 5);
    const events = simKOGames.map(g => { const wi = info(g.winnerName);
      return {owner: wi.owner || "—", team: g.winnerName,
        points: simStagePts(sc, g.stageCode, false),
        label: g.winnerName + " won (" + SIM_STAGE_LABEL[g.stageCode] + ")"}; })
      .filter(e => e.points > 0).slice(-5).reverse();

    return {generated: data.generated, simulated: true, leaderboard: lb,
      events, live: [], recent, upcoming: [], bracket: bracketOut,
      groups: groupsOut, thirdPlace: thirdOut, conduct: data.conduct,
      scoring: data.scoring, tournamentStarted: true};
  }

  const simBtn = document.getElementById("simbtn");
  simBtn.addEventListener("click", () => {
    if (simMode) {
      simMode = false; simData = null;
      simBtn.textContent = "Simulate"; simBtn.classList.remove("on");
      if (lastData) render(lastData); window.scrollTo({top: 0}); return;
    }
    if (!lastData) return;
    if (!lastData.sim) {
      window.alert("The simulator needs the latest score data. Run the " +
        "“Update scores” workflow once, then refresh the page.");
      return;
    }
    if (!window.confirm(
      "Simulate all the remaining games with random results?\n\n" +
      "This is just a what-if — your live standings stay untouched.")) return;
    try { simData = buildSimData(lastData); }
    catch (e) { console.error(e); window.alert("Sorry — the simulation hit a snag."); return; }
    simMode = true; simBtn.textContent = "See live results"; simBtn.classList.add("on");
    render(simData); window.scrollTo({top: 0});
  });

  function setView(v) {
    view = v;
    history.replaceState(null, "", v === "home" ? location.pathname : "#" + v);
    document.querySelectorAll(".tab").forEach(b =>
      b.classList.toggle("active", b.dataset.view === v));
    const cd = currentData(); if (cd) render(cd);
    window.scrollTo({ top: 0 });
  }
  document.querySelectorAll(".tab").forEach(b =>
    b.addEventListener("click", () => setView(b.dataset.view)));
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.dataset.view === view));

  function fail() {
    updatedEl.textContent = "Couldn't load scores";
    app.innerHTML = `<section><div class="error">
      <strong>No score data yet.</strong> If you just set this site up, run the
      “Update scores” workflow once from the repository's Actions tab, then refresh.
    </div></section>`;
  }

  function load() {
    fetch("data.json?t=" + Date.now())
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(d => { lastData = d; if (!simMode) render(d); })
      .catch(fail);
    // Odds live in their own file, written by the separate "Update odds"
    // workflow. Missing/!ok is fine: the Odds tab just shows its empty state.
    fetch("odds.json?t=" + Date.now())
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) { oddsData = d; if (view === "odds") render(currentData()); } })
      .catch(() => {});
  }

  load();
  setInterval(load, 5 * 60 * 1000); // re-check every 5 minutes while the page is open
  setInterval(tickCountdown, 1000); // smooth per-second countdown
})();
</script>
</body>
</html>
