<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#15431C">
<title>Family World Cup 2026: Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #15431C;
    --pitch-deep: #0E3014;
    --pitch-line: rgba(242, 240, 228, 0.22);
    --chalk: #F2F0E4;
    --chalk-dim: rgba(242, 240, 228, 0.6);
    --chalk-faint: rgba(242, 240, 228, 0.35);
    --gold: #E8C34A;
    --live: #FF5A45;
    --up: #57C97A;
    --held: #FF5147;
    --ice: #6FD8EC;
    --ink: #0B0E12;
    --display: "Oswald", sans-serif;
    --body: "Barlow", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(242,240,228,0.05), transparent 60%),
      repeating-linear-gradient(180deg, var(--pitch) 0 88px, var(--pitch-deep) 88px 176px);
    color: var(--chalk);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .wrap { max-width: 860px; margin: 0 auto; padding: 0 16px 64px; }

  /* ---------- Header: center-circle kickoff motif ---------- */
  header {
    position: relative;
    text-align: center;
    padding: 56px 12px 40px;
    overflow: hidden;
  }
  header::before {
    content: "";
    position: absolute;
    left: 50%; top: 0;
    width: 2px; height: 100%;
    background: var(--pitch-line);
    transform: translateX(-50%);
  }
  .center-circle {
    position: absolute;
    left: 50%; top: 50%;
    width: 340px; height: 340px;
    border: 2px solid var(--pitch-line);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  header h1, header .sub, header .updated { position: relative; }
  .eyebrow {
    font-family: var(--display);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--chalk-dim);
    position: relative;
  }
  header h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(40px, 8vw, 64px);
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin: 10px 0 6px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .sub { color: var(--chalk-dim); font-size: 15px; }
  .updated {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--chalk-faint);
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 999px;
    padding: 5px 14px;
  }

  /* ---------- Sections ---------- */
  section { margin-top: 44px; }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 14px;
  }
  .section-head h2 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  .section-head::after {
    content: "";
    flex: 1;
    height: 2px;
    background: var(--pitch-line);
  }

  /* ---------- Live strip ---------- */
  .live-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) { .live-dot, .match.upset::after, .match.held, .held-badge { animation: none; } }

  /* ---------- Leaderboard ---------- */
  .board { border-top: 2px solid var(--pitch-line); }
  .row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    gap: 0 16px;
    align-items: center;
    padding: 16px 8px 14px;
    border-bottom: 1px solid var(--pitch-line);
  }
  .rank {
    font-family: var(--display);
    font-weight: 500;
    font-size: 18px;
    color: var(--chalk-dim);
    width: 40px; height: 40px;
    border: 1.5px solid var(--pitch-line);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .who .name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .teams { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--chalk-dim);
    border: 1px solid var(--pitch-line);
    border-radius: 999px;
    padding: 2px 10px;
    background: rgba(0,0,0,0.12);
    white-space: nowrap;
  }
  .chip b { color: var(--chalk); font-weight: 600; }
  .chip.out {
    color: var(--chalk-faint);
    text-decoration: line-through;
    text-decoration-color: var(--live);
    text-decoration-thickness: 1.5px;
  }
  /* Teams guaranteed into the Round of 32 (data.json "clinched"): a light,
     constant golden glow plus a gold rim and gold points figure. Scoped to
     :not(.out) so the glow drops away the instant a team is knocked out and
     the chip falls back to the crossed-out treatment above. */
  .chip.clinched:not(.out) {
    border-color: var(--gold);
    box-shadow: 0 0 8px 1px rgba(232, 195, 74, 0.45);
  }
  .chip.clinched:not(.out) b { color: var(--gold); }
  .pts {
    font-family: var(--display);
    font-weight: 700;
    font-size: 34px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 64px;
  }
  .pts small {
    display: block;
    font-family: var(--body);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--chalk-faint);
    text-transform: uppercase;
  }

  /* Leader treatment: the one gold thing on the page */
  .row.leader {
    background: linear-gradient(90deg, rgba(232,195,74,0.10), transparent 70%);
    border-left: 3px solid var(--gold);
    padding-left: 12px;
  }
  .row.leader .rank { border-color: var(--gold); color: var(--gold); }
  .row.leader .pts { color: var(--gold); }

  /* Per-update movement on the Odds board: a small green ▲ / red ▼ under the
     big number. Selector outscopes ".row.leader .pts { color: gold }" so the
     arrow keeps its own colour even on the gold leader row. */
  .pts .delta {
    display: block;
    font-family: var(--body);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.02em;
    margin-top: 3px;
  }
  .row .pts .delta.up { color: var(--up); }
  .row .pts .delta.down { color: var(--live); }

  /* ---------- Match cards ---------- */
  .matches { display: grid; gap: 10px; }
  .match {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .match .team {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .match .team.home { justify-content: flex-start; }
  .match .team.away { justify-content: flex-end; }
  .match .tinfo { min-width: 0; }
  .match .team.away .tinfo { text-align: right; }
  .match .tname { font-weight: 600; font-size: 19px; line-height: 1.15; }
  .match .tname.proj { font-style: italic; color: var(--chalk-dim); }
  .match .tname.unres { font-style: italic; color: var(--chalk-faint); font-weight: 500; }
  .match .towner { font-size: 14px; color: var(--chalk-faint); }
  .match .trank {
    font-family: var(--display);
    font-weight: 600;
    font-size: 27px;
    line-height: 1;
    color: var(--chalk-faint);
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .match .mid { text-align: center; }
  .match .score {
    font-family: var(--display);
    font-weight: 700;
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .match .meta {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    white-space: nowrap;
  }
  .match.is-live { border-color: rgba(255,90,69,0.55); }
  .match.is-live .meta { color: var(--live); }

  /* Penalty shootout: Option A pill on an icy Option B rim. A finished
     shootout takes precedence over the gold UPSET pill (see matchCard). */
  .match.pens {
    position: relative;
    margin-top: 10px;
    border-color: var(--ice);
    box-shadow: inset 0 0 0 1px rgba(228,248,254,0.5), 0 0 22px rgba(111,216,236,0.30);
  }
  .pens-badge {
    position: absolute;
    top: -10px;
    left: 16px;
    z-index: 4;
    background: var(--ice);
    color: var(--ink);
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    padding: 2px 10px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .pens-badge .spot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    display: inline-block;
  }

  /* Upset: lower-ranked team beat a higher-ranked one. Gold outline, a
     corner "UPSET" pill, and a slow gold shimmer sweeping across the card. */
  /* The UPSET pill pokes 10px above the card (top:-10px); add that much top
     spacing so the pill doesn't crowd the card above it (e.g. two upsets in a row). */
  .match.upset { position: relative; border-color: var(--gold); margin-top: 10px; }
  .match.upset::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(100deg, transparent 32%,
      rgba(232,195,74,0.16) 50%, transparent 68%);
    background-size: 250% 100%;
    background-position: 150% 0;
    animation: upsetSweep 4s ease-in-out infinite;
  }
  @keyframes upsetSweep {
    0% { background-position: 150% 0; }
    55%, 100% { background-position: -60% 0; }
  }
  .upset-badge {
    position: absolute;
    top: -10px;
    left: 16px;
    z-index: 4;
    background: var(--gold);
    color: var(--pitch-deep);
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    padding: 2px 10px;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  /* Held: a big underdog (25+ FIFA places below) drew a much stronger side.
     Red outline + corner "HELD" pill, with a bright red glow that breathes
     around the whole card, plus a glowing heartbeat on the pill itself. */
  .match.held {
    position: relative;
    border-color: var(--held);
    margin-top: 11px;
    animation: heldBreathe 2.2s ease-in-out infinite;
  }
  @keyframes heldBreathe {
    0%, 100% { border-color: rgba(255,81,71,0.55); box-shadow: 0 0 0 0 rgba(255,81,71,0); }
    50% { border-color: rgba(255,81,71,1); box-shadow: 0 0 32px 4px rgba(255,81,71,0.45); }
  }
  .held-badge {
    position: absolute;
    top: -10px;
    left: 16px;
    z-index: 4;
    background: var(--pitch-deep);
    color: var(--held);
    border: 1.5px solid var(--held);
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 2px 10px;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transform-origin: center;
    animation: heldGlow 2.2s ease-in-out infinite, heldHeart 2.2s ease-in-out infinite;
  }
  @keyframes heldGlow {
    0%, 100% { box-shadow: 0 2px 6px rgba(0,0,0,0.3), 0 0 0 0 rgba(255,81,71,0); }
    50% { box-shadow: 0 2px 6px rgba(0,0,0,0.3), 0 0 13px 2px rgba(255,81,71,0.7); }
  }
  @keyframes heldHeart {
    0%, 46%, 100% { transform: scale(1); }
    10% { transform: scale(1.16); }
    20% { transform: scale(1); }
    30% { transform: scale(1.11); }
    40% { transform: scale(1); }
  }

  /* ---------- Next-match countdown ---------- */
  .countdown {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 12px;
    padding: 16px 18px 18px;
    text-align: center;
    margin-bottom: 8px;
  }
  .cd-label {
    font-family: var(--display);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--chalk-dim);
  }
  /* Fixed-size blocks so nothing shifts as the timer ticks: the timer box,
     each name box, and each rank slot are all fixed width. Long names wrap
     inside their box. */
  .cd-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 1.4vw, 16px);
    margin-top: 8px;
  }
  .cd-team { display: flex; align-items: center; gap: clamp(7px, 1vw, 13px); }
  .cd-tinfo { width: clamp(78px, 18.5vw, 165px); }
  .cd-team.home .cd-tinfo { text-align: right; }
  .cd-team.away .cd-tinfo { text-align: left; }
  .cd-center { width: clamp(118px, 32.8vw, 300px); flex: 0 0 auto; }
  .cd-timer {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(18px, 5.4vw, 50px);
    line-height: 1.02;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .cd-name { font-weight: 600; font-size: clamp(12px, 2.8vw, 25px); line-height: 1.12; overflow-wrap: break-word; }
  .cd-owner { font-size: clamp(11px, 1.7vw, 16px); color: var(--chalk-faint); }
  .cd-rank {
    width: clamp(44px, 6.8vw, 60px);
    flex: 0 0 auto;
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(17px, 3.6vw, 33px);
    line-height: 1;
    color: var(--chalk-faint);
    font-variant-numeric: tabular-nums;
  }
  .cd-team.home .cd-rank { text-align: left; }
  .cd-team.away .cd-rank { text-align: right; }
  .cd-stage {
    font-size: clamp(9.5px, 1.3vw, 12px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    margin-top: 4px;
  }

  /* ---------- Events ---------- */
  .events { list-style: none; display: grid; gap: 8px; }
  .events li {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: 14.5px;
    padding: 9px 4px;
    border-bottom: 1px dashed var(--pitch-line);
  }
  .events .gain {
    font-family: var(--display);
    font-weight: 600;
    white-space: nowrap;
  }
  .events .owner { font-weight: 600; }

  /* ---------- Rules ---------- */
  .rules {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
  }
  .rule {
    border: 1px solid var(--pitch-line);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
    background: rgba(0,0,0,0.1);
  }
  .rule .v { font-family: var(--display); font-weight: 700; font-size: 22px; }
  .rule .k { font-size: 11.5px; color: var(--chalk-dim); }

  /* ---------- Knockout bracket ---------- */
  .bkt-section { width: min(1340px, 94vw); margin-left: 50%; transform: translateX(-50%); }
  @media (max-width: 600px) { .bkt-section { width: 100%; margin-left: 0; transform: none; } }
  .bkt-tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 2px 0 18px; }
  .bkt-tabs button {
    font-family: var(--display); font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; font-size: 12px; padding: 7px 14px; border-radius: 999px;
    cursor: pointer; background: transparent; color: var(--chalk-dim);
    border: 1px solid var(--pitch-line); transition: 0.18s;
  }
  .bkt-tabs button:hover { border-color: var(--gold); color: var(--chalk); }
  .bkt-tabs button.active { background: var(--gold); color: var(--pitch-deep); border-color: var(--gold); }

  .bkt-stage { position: relative; width: 100%; }
  .bkt-links { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .bkt-box {
    position: absolute; z-index: 1; background: var(--pitch-deep);
    border: 1px solid var(--pitch-line); border-radius: 6px; overflow: hidden;
    padding: 3px 8px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: center;
    transition: top .46s cubic-bezier(.3,.85,.3,1), left .46s cubic-bezier(.3,.85,.3,1),
      width .46s cubic-bezier(.3,.85,.3,1), height .46s cubic-bezier(.3,.85,.3,1), box-shadow .3s;
  }
  .bkt-box.on { box-shadow: 0 7px 22px rgba(0,0,0,0.32); border-color: rgba(232,195,74,0.45);
    animation: bktpop .5s cubic-bezier(.34,1.3,.5,1); }
  @keyframes bktpop { 0% { transform: scale(.82); } 55% { transform: scale(1.03); } 100% { transform: scale(1); } }

  .bline { display: flex; align-items: baseline; gap: 8px; white-space: nowrap; line-height: 1.3; }
  .bline .bn { font-weight: 600; flex: 0 0 auto; overflow: hidden; text-overflow: ellipsis; }
  .bline .bsub { color: var(--chalk-faint); flex: 1 1 auto; min-width: 0; overflow: hidden;
    text-overflow: ellipsis; font-size: 0.8em; }
  .bline .bsc { font-family: var(--display); font-weight: 600; font-variant-numeric: tabular-nums;
    margin-left: auto; flex: 0 0 auto; }
  .bline .bsc .bpen { font-family: var(--body); font-weight: 600; margin-left: 1px; }
  .bline.winner .bn { color: var(--gold); }
  .bline.loser { opacity: 0.42; }
  .bline.loser .bn { text-decoration: line-through; text-decoration-color: var(--live); text-decoration-thickness: 1.5px; }
  .bline.projd .bn { font-style: italic; color: var(--chalk-dim); }
  .bline.unres .bn { font-style: italic; color: var(--chalk-faint); font-weight: 500; }
  .bmeta2 { font-size: 10.5px; letter-spacing: 0.05em; color: var(--chalk-faint);
    margin-top: 5px; padding-top: 5px; border-top: 1px dashed var(--pitch-line);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .bkt-box.on .bline { font-size: 14px; }
  .bkt-box:not(.on) .bline { font-size: 10px; gap: 5px; }
  .bkt-box:not(.on) .bn { flex: 1 1 auto; min-width: 0; }

  .bkt-list { display: none; }
  .bkt-list .lcard { background: var(--pitch-deep); border: 1px solid var(--pitch-line);
    border-radius: 9px; padding: 11px 15px; margin-bottom: 10px; }
  .bkt-list .bline { font-size: 16px; }
  .bkt-list .bline + .bline { margin-top: 3px; }
  .bkt-list .bmeta2 { font-size: 11.5px; margin-top: 7px; }


  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 2px 0 6px;
  }
  .tab {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--chalk-dim);
    background: var(--pitch-deep);
    border: 1px solid var(--pitch-line);
    border-radius: 999px;
    padding: 9px 24px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .tab:hover { color: var(--chalk); }
  .tab.active {
    color: var(--pitch-deep);
    background: var(--chalk);
    border-color: var(--chalk);
  }
  .tab:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---------- Group tables ---------- */
  .ggrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 12px;
  }
  .gcard {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .gname {
    font-family: var(--display);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .gpending {
    font-family: var(--body);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--chalk-faint);
    font-style: italic;
  }
  .gtable { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .gtable th {
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    text-align: center;
    padding: 2px 4px;
  }
  .gtable th.l, .gtable td.gteam { text-align: left; }
  .gtable td {
    padding: 5px 4px;
    border-top: 1px dashed var(--pitch-line);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  /* Position column narrow, team column flexible, every stat column the
     same fixed width so P/Pts/GD/GF/Cond/FIFA are equidistant and centered. */
  .gtable th:nth-child(1), .gtable td:nth-child(1) { width: 24px; }
  .gtable td.gteam { width: auto; overflow: hidden; text-overflow: ellipsis; }
  .gtable th:nth-child(n+3), .gtable td:nth-child(n+3) { width: 32px; }
  .gpos { color: var(--chalk-faint); }
  .gowner { display: block; font-size: 10.5px; color: var(--chalk-faint); }
  .gtable tr.adv td { background: rgba(242, 240, 228, 0.06); }
  .gtable tr.adv td.gteam, .gtable tr.adv td.gpts { font-weight: 600; }
  /* Clinched a Round-of-32 place (data.json "clinched" on group rows and on
     thirdPlace entries): the team NAME glows gold. The owner/group subtext
     below keeps its plain faint styling. */
  .gtable td.gteam.clinched {
    color: var(--gold);
    text-shadow: 0 0 9px rgba(232, 195, 74, 0.55), 0 0 2px rgba(232, 195, 74, 0.65);
  }
  .gtable td.gteam.clinched .gowner {
    color: var(--chalk-faint);
    text-shadow: none;
  }
  .gtable-wrap {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 10px;
    padding: 6px 14px 10px;
    overflow-x: auto;
  }
  .gnote { font-size: 13.5px; color: var(--chalk-dim); margin: 10px 2px; }

  /* ---------- Rulebook (large highlighted rules text) ---------- */
  .rulebook {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 12px;
    padding: 26px 26px 30px;
    font-size: 18px;
    line-height: 1.65;
  }
  .rulebook h3 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 24px;
    letter-spacing: 0.03em;
    margin: 26px 0 10px;
  }
  .rulebook h3:first-child { margin-top: 0; }
  .rulebook p { color: var(--chalk-dim); margin-bottom: 10px; }
  .rulebook mark {
    background: rgba(232, 195, 74, 0.22);
    color: var(--chalk);
    padding: 0 4px;
    border-radius: 3px;
  }
  ol.criteria { list-style: none; counter-reset: c; margin: 14px 0 6px; }
  ol.criteria li {
    counter-increment: c;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--pitch-line);
    font-family: var(--display);
    font-weight: 500;
    font-size: 21px;
    letter-spacing: 0.02em;
  }
  ol.criteria li::before {
    content: counter(c);
    font-size: 15px;
    color: var(--chalk-dim);
    border: 1.5px solid var(--pitch-line);
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 32px;
  }
  ul.cardpts { list-style: none; margin-top: 12px; display: grid; gap: 8px; }
  ul.cardpts li {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-size: 18px;
  }
  ul.cardpts .v {
    font-family: var(--display);
    font-weight: 700;
    font-size: 26px;
    min-width: 58px;
    text-align: right;
    background: rgba(232, 195, 74, 0.22);
    border-radius: 6px;
    padding: 0 8px;
  }

  .empty {
    color: var(--chalk-faint);
    font-style: italic;
    padding: 14px 4px;
  }
  .error {
    border: 1px solid rgba(255,90,69,0.5);
    border-radius: 10px;
    padding: 16px;
    background: rgba(255,90,69,0.08);
  }
  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 12.5px;
    color: var(--chalk-faint);
  }

  @media (min-width: 561px) {
    /* Desktop-only leaderboard tweaks */
    .eyebrow { font-size: 13.7px; }       /* +5% */
    .sub { font-size: 16.5px; }           /* +10% */
    .section-head h2 { font-size: 21px; } /* +5% */
    /* Put each person's country chips on the same line as their name so the
       standings read as thin single-line rows, evenly spread across width. */
    .who { display: flex; align-items: center; gap: 18px; }
    .who .name { white-space: nowrap; flex: 0 0 auto; }
    .teams { margin-top: 0; flex: 0 1 auto; flex-wrap: nowrap; gap: 10px; }
  }

  /* Countdown switches to the stacked (rank-on-top) layout before the wider
     beside-the-timer row would run out of room and clip a team name. Sizes
     come from the shared clamp()s above, so the text still scales fluidly. */
  @media (max-width: 740px) {
    .cd-team { flex-direction: column; gap: 1px; }
    .cd-team.home { align-items: flex-start; }
    .cd-team.away { align-items: flex-end; }
    .cd-team.home .cd-tinfo { text-align: left; }
    .cd-team.away .cd-tinfo { text-align: right; }
    .cd-rank { width: clamp(78px, 18.5vw, 165px); }
    .cd-team.home .cd-rank { text-align: left; order: -1; }
    .cd-team.away .cd-rank { text-align: right; }
  }

  @media (max-width: 560px) {
    .row { grid-template-columns: 40px 1fr auto; gap: 0 10px; }
    .rank { width: 32px; height: 32px; font-size: 15px; }
    .who .name { font-size: 18px; }
    .pts { font-size: 27px; min-width: 52px; }
    /* Mobile keeps the original compact single-row match card: no FIFA
       ranks, original font sizes. (Desktop keeps the larger names + ranks.) */
    .match { padding: 10px 12px; }
    .match .trank { display: none; }
    .match .tname { font-size: 13.5px; }
    .match .towner { font-size: 12px; }
  }

  /* "Simulate remaining games" control (fixed, top-right) + the what-if banner */
  #simbtn {
    position: fixed; top: 12px; right: 12px; z-index: 60;
    font-family: var(--display); font-weight: 600; font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--gold); background: rgba(14, 48, 20, 0.92);
    border: 1px solid var(--gold); border-radius: 999px;
    padding: 7px 14px; cursor: pointer; -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
  }
  #simbtn:hover { background: var(--gold); color: var(--pitch-deep); }
  #simbtn.on { color: var(--chalk); border-color: var(--chalk); }
  #simbtn.on:hover { background: var(--chalk); color: var(--pitch-deep); }
  #simbtn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .simbar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    flex-wrap: wrap; margin: 0 0 14px; padding: 8px 14px;
    border: 1px dashed var(--gold); border-radius: 10px;
    background: rgba(232, 195, 74, 0.08); color: var(--gold);
    font-size: 13.5px; font-weight: 500;
  }
  .simbar-x {
    font: inherit; color: var(--chalk); background: transparent;
    border: 1px solid var(--pitch-line); border-radius: 999px;
    padding: 3px 10px; cursor: pointer;
  }
  .simbar-x:hover { border-color: var(--chalk); }

  /* "Winner clinches" pills on upcoming group games (home feed + countdown).
     Match-level lines stack in a full-width footer; per-team tags ("Through",
     "Win to advance") sit under the owner; an already-qualified team's name
     glows gold like the leaderboard/group treatments. */
  .match .cstake {
    grid-column: 1 / -1;
    border-top: 1px dashed rgba(232, 195, 74, 0.22);
    margin-top: 11px; padding-top: 11px;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .cpill {
    font-family: var(--display); font-weight: 600; font-size: 11.5px;
    letter-spacing: 0.07em; text-transform: uppercase; border-radius: 999px;
    padding: 5px 13px; display: inline-flex; align-items: center; gap: 7px;
    white-space: nowrap;
  }
  .cpill.grp { background: var(--gold); color: #3F2D04; }
  .cpill.adv { background: rgba(232, 195, 74, 0.12); color: var(--gold);
    border: 1px solid rgba(232, 195, 74, 0.7); }
  .cpill.draw { background: rgba(143, 185, 173, 0.10); color: #AFD6CB;
    border: 1px solid rgba(143, 185, 173, 0.5); }
  .ctag, .cd-ctag {
    display: inline-block; margin-top: 4px;
    font-family: var(--display); font-weight: 600; font-size: 11px;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--gold);
    border: 1px solid rgba(232, 195, 74, 0.55); border-radius: 999px;
    padding: 1px 8px;
  }
  .match .tname.through, .cd-name.through { color: var(--gold); }
  .cd-stake { display: flex; flex-direction: column; align-items: center;
    gap: 7px; margin-top: 12px; }
</style>
</head>
<body>
<button id="simbtn" type="button" aria-label="Simulate the remaining games">Simulate</button>
<div class="wrap">

  <header>
    <div class="center-circle" aria-hidden="true"></div>
    <div class="eyebrow">World Cup 2026 &middot; Family Pool</div>
    <h1>The Family Cup</h1>
    <div class="sub">One tournament. Fourteen rivals. No mercy at the dinner table.</div>
    <div class="updated" id="updated">Loading scores…</div>
  </header>

  <nav class="tabs" aria-label="Site sections">
    <button class="tab active" data-view="home">Leaderboard</button>
    <button class="tab" data-view="groups">Groups</button>
    <button class="tab" data-view="bracket">Bracket</button>
    <button class="tab" data-view="conduct">Conduct</button>
    <button class="tab" data-view="odds">Odds</button>
  </nav>

  <div id="app"></div>

  <footer>
    Scores via football-data.org &middot; odds via Kalshi &middot; updates automatically every 20 minutes &middot;
    kickoff times shown in your local time
  </footer>
</div>

<script>
(function () {
  const app = document.getElementById("app");
  const updatedEl = document.getElementById("updated");
  const esc = s => String(s ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  const fmtPts = p => (p % 1 === 0 ? String(p) : p.toFixed(1));
  const fmtKick = iso => {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      weekday: "short", month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  };

  function teamCell(t, side, tagHTML) {
    const unres = t.resolved === false;
    const proj = t.projected === true;
    const through = t.clinched === true && !unres;
    const nm = unres ? esc(t.slot || "TBD") : esc(t.name);
    const hasRank = !unres && t.fifaRank !== null && t.fifaRank !== undefined;
    const rankEl = `<div class="trank">${hasRank ? "#" + t.fifaRank : ""}</div>`;
    const sub = t.owner ? esc(t.owner)
      : (proj && t.slot ? esc(t.slot) : "&mdash;");
    const info = `<div class="tinfo">
      <div class="tname ${proj ? "proj" : ""} ${unres ? "unres" : ""} ${through ? "through" : ""}">${nm}</div>
      <div class="towner">${sub}</div>
      ${tagHTML || ""}
    </div>`;
    // Big rank sits right beside the team name (inner side), vertically
    // centered: after the info for home, before it for the away team.
    return `<div class="team ${side}">
      ${side === "away" ? rankEl + info : info + rankEl}
    </div>`;
  }

  // Build the stacked match-level footer (winner line, then draw line) and the
  // per-team tag ("Through" if already qualified, else "Win to advance").
  function clinchFooter(c) {
    if (!c) return "";
    let h = "";
    if (c.winnerWinsGroup)
      h += `<span class="cpill grp">Winner wins ${esc(c.group ? "Group " + c.group : "the group")}</span>`;
    else if (c.winnerAdvances)
      h += `<span class="cpill adv">Winner advances</span>`;
    if (c.drawBoth)
      h += `<span class="cpill draw">A draw: both go through</span>`;
    return h;
  }
  function clinchTag(side, cside, cls) {
    if (side && side.clinched) return `<div class="${cls}">Through</div>`;
    if (cside && cside.winAdvances) return `<div class="${cls}">Win to advance</div>`;
    return "";
  }
  function teamCellW(m, side) {
    // teamCell variant for upcoming games: passes the per-team clinch tag.
    const t = side === "home" ? m.home : m.away;
    const c = m.clinch;
    const cside = c ? (side === "home" ? c.home : c.away) : null;
    return teamCell(t, side, clinchTag(t, cside, "ctag"));
  }

  function fmtCountdown(ms) {
    if (ms <= 0) return null;
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return `${d}d ${h}h ${m}m`;
    if (h > 0) return `${h}h ${m}m ${sec}s`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
  }

  // Updates the live timer every second and removes the card the instant its
  // own countdown crosses zero (rather than sitting at 0:00 while the data
  // refresh catches up).
  function tickCountdown() {
    const el = document.getElementById("countdown");
    if (!el) return;
    const txt = fmtCountdown(new Date(el.dataset.kickoff).getTime() - Date.now());
    if (txt === null) { el.remove(); return; }
    const t = el.querySelector(".cd-timer");
    if (t) t.textContent = txt;
  }

  function countdownCard(m) {
    const c = m.clinch;
    const rank = t => (t.fifaRank !== null && t.fifaRank !== undefined)
      ? `<div class="cd-rank">#${t.fifaRank}</div>` : "";
    const info = (t, side) => {
      const through = t.clinched === true;
      const cside = c ? (side === "home" ? c.home : c.away) : null;
      return `<div class="cd-tinfo">
        <div class="cd-name ${through ? "through" : ""}">${esc(t.name)}</div>
        <div class="cd-owner">${t.owner ? esc(t.owner) : "&mdash;"}</div>
        ${clinchTag(t, cside, "cd-ctag")}</div>`;
    };
    const initial = fmtCountdown(new Date(m.utcDate).getTime() - Date.now()) || "";
    const footer = clinchFooter(c);
    return `<div class="countdown" id="countdown" data-kickoff="${esc(m.utcDate)}">
      <div class="cd-label">Next match</div>
      <div class="cd-row">
        <div class="cd-team home">${info(m.home, "home")}${rank(m.home)}</div>
        <div class="cd-center">
          <div class="cd-timer">${initial}</div>
          <div class="cd-stage">${esc(m.stage)}</div>
        </div>
        <div class="cd-team away">${rank(m.away)}${info(m.away, "away")}</div>
      </div>
      ${footer ? `<div class="cd-stake">${footer}</div>` : ""}
    </div>`;
  }

  function matchCard(m) {
    const live = m.status === "IN_PLAY" || m.status === "PAUSED";
    const done = m.status === "FINISHED" || m.status === "AWARDED";
    const hasScore = m.home.goals !== null && m.home.goals !== undefined;
    // Upset: a finished game the lower-ranked side won by a clear margin —
    // the winner's FIFA rank number is at least 5 higher than the loser's.
    // Penalty wins count (the winner is the team that advanced). Both ranks
    // must be known.
    let upset = false;
    if (done && m.winner && m.winner !== "DRAW") {
      const wr = m.winner === "HOME_TEAM" ? m.home.fifaRank : m.away.fifaRank;
      const lr = m.winner === "HOME_TEAM" ? m.away.fifaRank : m.home.fifaRank;
      if (wr != null && lr != null && wr - lr >= 5) upset = true;
    }
    // Held: a finished draw in which one side is a big underdog: its FIFA rank
    // number is at least 25 higher (lower-ranked) than its opponent's. Mutually
    // exclusive with upset (which requires a winner). Both ranks must be known.
    let held = false;
    if (done && m.winner === "DRAW") {
      const hr = m.home.fifaRank, ar = m.away.fifaRank;
      if (hr != null && ar != null && Math.abs(hr - ar) >= 25) held = true;
    }
    // A finished shootout flies the PENS flag, which takes precedence over the
    // UPSET pill (a shootout can also be an upset; PENS wins). Held only fires
    // on draws, so it can never coincide with a shootout.
    const pens = done && m.penalties === true;
    const showUpset = upset && !pens;
    // Shootout: show the penalty score in brackets, in the same .score block
    // as the regulation scoreline (which is fullTime minus penalties).
    const penStr = (m.penalties && m.home.penGoals != null && m.away.penGoals != null)
      ? ` <span class="pen">(${m.home.penGoals}-${m.away.penGoals})</span>` : "";
    const mid = (live || done) && hasScore
      ? `<div class="score">${m.home.goals}&ndash;${m.away.goals}${penStr}</div>
         <div class="meta">${live ? '<span class="live-dot"></span> Live' : (m.penalties ? "FT &middot; pens" : "FT")} &middot; ${esc(m.stage)}</div>`
      : `<div class="score" style="font-size:15px;font-weight:500;color:var(--chalk-dim)">${esc(fmtKick(m.utcDate))}</div>
         <div class="meta">${esc(m.stage)}</div>`;
    // Clinch pills/tags show only on upcoming (not-yet-started) games.
    const showClinch = !live && !done;
    const footer = showClinch ? clinchFooter(m.clinch) : "";
    const homeCell = showClinch ? teamCellW(m, "home") : teamCell(m.home, "home");
    const awayCell = showClinch ? teamCellW(m, "away") : teamCell(m.away, "away");
    return `<div class="match ${live ? "is-live" : ""} ${pens ? "pens" : ""} ${showUpset ? "upset" : ""} ${held ? "held" : ""}">
      ${pens ? '<div class="pens-badge"><span class="spot"></span>PENS</div>'
             : (showUpset ? '<div class="upset-badge">UPSET</div>' : "")}
      ${held ? '<div class="held-badge">Held</div>' : ""}
      ${homeCell}
      <div class="mid">${mid}</div>
      ${awayCell}
      ${footer ? `<div class="cstake">${footer}</div>` : ""}
    </div>`;
  }

  function section(title, inner) {
    return `<section><div class="section-head"><h2>${title}</h2></div>${inner}</section>`;
  }

  // ---- Animated standings: rows start shuffled at 0 points and race up into
  // their final order, counting in 0.5s with an exponentially accelerating pace
  // (350ms between steps at the start, easing to 100ms by the end). Only the
  // row positions and the points numbers move: the card markup is untouched. ----
  let lbAnimated = false;
  let oddsAnimated = false;
  const lbReduceMotion = () =>
    window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  function lbShuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
  function lbSetPts(r,v){ r.ptsEl.innerHTML = fmtPts(v) + "<small>pts</small>"; }

  // FLIP: glide rows to a new order, handling their variable heights.
  function lbFlip(board, rows, order){
    const first = rows.map(r => r.el.getBoundingClientRect().top);
    order.forEach(ri => board.appendChild(rows[ri].el));
    const d = rows.map((r,i) => first[i] - r.el.getBoundingClientRect().top);
    rows.forEach((r,i)=>{ if(Math.abs(d[i])>0.5){ r.el.style.transition="none"; r.el.style.transform=`translateY(${d[i]}px)`; }});
    void board.offsetWidth;                       // one reflow, then play
    rows.forEach((r,i)=>{ if(Math.abs(d[i])>0.5){ r.el.style.transition="transform .7s cubic-bezier(.34,1.2,.5,1)"; r.el.style.transform=""; }});
  }

  function animateLeaderboard(data){
    const board = app.querySelector(".board");
    if(!board) return;
    const els = [...board.querySelectorAll(".row")];
    const lb = data.leaderboard || [];
    if(els.length < 2 || els.length !== lb.length) return;
    const n = els.length;
    const rows = els.map((el,i)=>({ el, target: lb[i].points, current:0,
      rankEl: el.querySelector(".rank"), ptsEl: el.querySelector(".pts") }));
    rows.forEach(r=>{ r.el.classList.remove("leader"); lbSetPts(r,0); });
    let order = lbShuffle([...Array(n).keys()]);
    order.forEach(ri => board.appendChild(rows[ri].el));        // shuffled start, no anim
    order.forEach((ri,idx)=> rows[ri].rankEl.textContent = idx+1);

    const STEP=0.5, START=350, END=100;
    const totalSteps = Math.max(1, Math.ceil(Math.max(...rows.map(r=>r.target))/STEP));
    let k=0;
    const finish=()=>{
      if(!board.isConnected) return;
      order=[...Array(n).keys()];                                // exact data order
      lbFlip(board, rows, order);
      rows.forEach((r,i)=>{ lbSetPts(r, r.target);
        r.rankEl.textContent = lb[i].rank;                       // real ranks (ties shared)
        r.el.classList.toggle("leader", lb[i].rank===1 && lb[i].points>0); });
      setTimeout(()=>{ rows.forEach(r=>{ r.el.style.transition=""; r.el.style.transform=""; }); }, 760);
    };
    const stepFn=()=>{
      if(!board.isConnected) return;
      let climbing=false;
      rows.forEach(r=>{ if(r.current<r.target){ r.current=Math.min(r.target,r.current+STEP); climbing=true; } lbSetPts(r,r.current); });
      const prev=new Map(order.map((ri,i)=>[ri,i]));             // stable tiebreak keeps the shuffle until points diverge
      order=[...order].sort((a,b)=> (rows[b].current-rows[a].current) || (prev.get(a)-prev.get(b)));
      lbFlip(board, rows, order);
      order.forEach((ri,idx)=> rows[ri].rankEl.textContent = idx+1);
      k++;
      if(climbing){ const p=Math.min(1,k/totalSteps); setTimeout(stepFn, START*Math.pow(END/START,p)); }
      else finish();
    };
    setTimeout(stepFn, 600);                                     // hold the shuffled board a beat
  }

  // ---- Odds race: identical mechanic to the standings, but each person
  // counts up from 0.0% to their combined win odds. Reuses the same FLIP and
  // shuffle helpers; only the value the cell shows differs (a "% to win"). ----
  function oddsSetVal(r, vPct){ r.ptsEl.innerHTML = vPct.toFixed(1) + "%<small>to win</small>" + (r.deltaHTML || ""); }

  function animateOdds(){
    const board = app.querySelector(".board");
    if(!board) return;
    const els = [...board.querySelectorAll(".row")];
    const st = (oddsData && oddsData.standings) || [];
    if(els.length < 2 || els.length !== st.length) return;
    const n = els.length;
    const rows = els.map((el,i)=>({ el, target: (st[i].odds||0)*100, current:0, deltaHTML:"",
      rankEl: el.querySelector(".rank"), ptsEl: el.querySelector(".pts") }));
    rows.forEach(r=>{ r.el.classList.remove("leader"); oddsSetVal(r,0); });
    let order = lbShuffle([...Array(n).keys()]);
    order.forEach(ri => board.appendChild(rows[ri].el));        // shuffled start, no anim
    order.forEach((ri,idx)=> rows[ri].rankEl.textContent = idx+1);

    const STEP=0.5, START=350, END=100;
    const totalSteps = Math.max(1, Math.ceil(Math.max(...rows.map(r=>r.target))/STEP));
    let k=0;
    const finish=()=>{
      if(!board.isConnected) return;
      order=[...Array(n).keys()];                                // exact data order
      lbFlip(board, rows, order);
      rows.forEach((r,i)=>{ r.deltaHTML = fmtDelta(st[i].delta); oddsSetVal(r, r.target);
        r.rankEl.textContent = st[i].rank;                       // real ranks (ties shared)
        r.el.classList.toggle("leader", st[i].rank===1 && st[i].odds>0); });
      setTimeout(()=>{ rows.forEach(r=>{ r.el.style.transition=""; r.el.style.transform=""; }); }, 760);
    };
    const stepFn=()=>{
      if(!board.isConnected) return;
      let climbing=false;
      rows.forEach(r=>{ if(r.current<r.target){ r.current=Math.min(r.target,r.current+STEP); climbing=true; } oddsSetVal(r,r.current); });
      const prev=new Map(order.map((ri,i)=>[ri,i]));             // stable tiebreak keeps the shuffle until odds diverge
      order=[...order].sort((a,b)=> (rows[b].current-rows[a].current) || (prev.get(a)-prev.get(b)));
      lbFlip(board, rows, order);
      order.forEach((ri,idx)=> rows[ri].rankEl.textContent = idx+1);
      k++;
      if(climbing){ const p=Math.min(1,k/totalSteps); setTimeout(stepFn, START*Math.pow(END/START,p)); }
      else finish();
    };
    setTimeout(stepFn, 600);                                     // hold the shuffled board a beat
  }

  // Percentage formatter for the team chips (input is a 0..1 probability).
  function fmtPct(p){
    const v = (p || 0) * 100;
    if (v <= 0) return "0%";
    if (v < 0.1) return "&lt;0.1%";
    return v.toFixed(1) + "%";
  }

  // Movement since the last update (input is a signed 0..1 delta). Returns a
  // coloured ▲/▼ span, or "" when unknown (first run) or negligible (<0.05pp).
  function fmtDelta(d){
    if (d === null || d === undefined) return "";
    const v = d * 100;
    if (Math.abs(v) < 0.05) return "";
    const up = v > 0;
    return `<span class="delta ${up ? "up" : "down"}">${up ? "▲" : "▼"} ${Math.abs(v).toFixed(1)}%</span>`;
  }

  function render(data) {

    } else {
      const when = data.generated ? new Date(data.generated).toLocaleString() : "—";

      updatedEl.innerHTML = (anyLive ? '<span class="live-dot"></span> ' : "") +
        "Scores as of " + esc(when);
    }
    app.innerHTML = view === "groups" ? renderGroups(data)
                  : view === "bracket" ? renderBracket(data)
                  : view === "conduct" ? renderConduct(data)
                  : view === "odds" ? renderOdds(data)

    if (data.simulated) {
      app.insertAdjacentHTML("afterbegin",
        '<div class="simbar">Simulated results — one random what-if. ' +
        '<button type="button" class="simbar-x" id="simexit">Back to live</button></div>');
      const x = document.getElementById("simexit");
      if (x) x.addEventListener("click", () => simBtn.click());

    tickCountdown();
    if (view === "bracket") mountBracket(data);
    if(!lbAnimated && !["groups","bracket","conduct","odds"].includes(view)
       && (data.leaderboard||[]).length > 1 && !lbReduceMotion()){
      lbAnimated = true;
      animateLeaderboard(data);
    }
    if(!oddsAnimated && view === "odds" && oddsData
       && (oddsData.standings||[]).length > 1 && !lbReduceMotion()){
      oddsAnimated = true;
      animateOdds();
    }
  }

  function renderHome(data) {

    html += section("How points work",

        `<div class="rule"><div class="v">${fmtPts(v ?? 0)}</div><div class="k">${esc(k)}</div></div>`).join("")}</div>`);

    return html;
  }

  function renderGroups(data) {

          <td>${t.played}</td><td>${t.points}</td><td>${signedGD(t.gd)}</td><td>${t.gf}</td>

      html += section("Best third-place race", `

    }

    // Group-stage tiebreaker rulebook: same styling as the third-place rules
    html += section("Group tiebreakers", `<div class="rulebook">
      <h3>How are teams ranked within a group?</h3>
      <p>Teams are ordered first by total <mark>points</mark>: 3 for a win,

      <h3>Step one: results between the tied teams</h3>
      <p>First, look only at the matches played <mark>between the teams that are

        <li>Most goals scored in those matches</li>

      <p>So if two teams tie on 6 points but one beat the other head-to-head, the

      <p>If some teams are <mark>still</mark> level after step one, the ones that

      <ol class="criteria">

            officials: see below)</li>

      <p>If teams cannot be separated by steps one and two, they are ranked by the
