<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#15431C">
<title>Family World Cup 2026 — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #15431C;
    --pitch-deep: #0E3014;
    --pitch-line: rgba(242, 240, 228, 0.22);
    --chalk: #F2F0E4;
    --chalk-dim: rgba(242, 240, 228, 0.6);
    --chalk-faint: rgba(242, 240, 228, 0.35);
    --gold: #E8C34A;
    --live: #FF5A45;
    --display: "Oswald", sans-serif;
    --body: "Barlow", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, rgba(242,240,228,0.05), transparent 60%),
      repeating-linear-gradient(180deg, var(--pitch) 0 88px, var(--pitch-deep) 88px 176px);
    color: var(--chalk);
    font-family: var(--body);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .wrap { max-width: 860px; margin: 0 auto; padding: 0 16px 64px; }

  /* ---------- Header: center-circle kickoff motif ---------- */
  header {
    position: relative;
    text-align: center;
    padding: 56px 12px 40px;
    overflow: hidden;
  }
  header::before {
    content: "";
    position: absolute;
    left: 50%; top: 0;
    width: 2px; height: 100%;
    background: var(--pitch-line);
    transform: translateX(-50%);
  }
  .center-circle {
    position: absolute;
    left: 50%; top: 50%;
    width: 340px; height: 340px;
    border: 2px solid var(--pitch-line);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  header h1, header .sub, header .updated { position: relative; }
  .eyebrow {
    font-family: var(--display);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--chalk-dim);
    position: relative;
  }
  header h1 {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(40px, 8vw, 64px);
    line-height: 1.05;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin: 10px 0 6px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .sub { color: var(--chalk-dim); font-size: 15px; }
  .updated {
    margin-top: 18px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--chalk-faint);
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 999px;
    padding: 5px 14px;
  }

  /* ---------- Sections ---------- */
  section { margin-top: 44px; }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 14px;
  }
  .section-head h2 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }
  .section-head::after {
    content: "";
    flex: 1;
    height: 2px;
    background: var(--pitch-line);
  }

  /* ---------- Live strip ---------- */
  .live-dot {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) { .live-dot, .match.upset::after { animation: none; } }

  /* ---------- Leaderboard ---------- */
  .board { border-top: 2px solid var(--pitch-line); }
  .row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    gap: 0 16px;
    align-items: center;
    padding: 16px 8px 14px;
    border-bottom: 1px solid var(--pitch-line);
  }
  .rank {
    font-family: var(--display);
    font-weight: 500;
    font-size: 18px;
    color: var(--chalk-dim);
    width: 40px; height: 40px;
    border: 1.5px solid var(--pitch-line);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .who .name {
    font-family: var(--display);
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .teams { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--chalk-dim);
    border: 1px solid var(--pitch-line);
    border-radius: 999px;
    padding: 2px 10px;
    background: rgba(0,0,0,0.12);
    white-space: nowrap;
  }
  .chip b { color: var(--chalk); font-weight: 600; }
  .chip.out {
    color: var(--chalk-faint);
    text-decoration: line-through;
    text-decoration-color: var(--live);
    text-decoration-thickness: 1.5px;
  }
  .pts {
    font-family: var(--display);
    font-weight: 700;
    font-size: 34px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    min-width: 64px;
  }
  .pts small {
    display: block;
    font-family: var(--body);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--chalk-faint);
    text-transform: uppercase;
  }

  /* Leader treatment — the one gold thing on the page */
  .row.leader {
    background: linear-gradient(90deg, rgba(232,195,74,0.10), transparent 70%);
    border-left: 3px solid var(--gold);
    padding-left: 12px;
  }
  .row.leader .rank { border-color: var(--gold); color: var(--gold); }
  .row.leader .pts { color: var(--gold); }

  /* ---------- Match cards ---------- */
  .matches { display: grid; gap: 10px; }
  .match {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .match .team {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .match .team.home { justify-content: flex-start; }
  .match .team.away { justify-content: flex-end; }
  .match .tinfo { min-width: 0; }
  .match .team.away .tinfo { text-align: right; }
  .match .tname { font-weight: 600; font-size: 19px; line-height: 1.15; }
  .match .tname.proj { font-style: italic; color: var(--chalk-dim); }
  .match .tname.unres { font-style: italic; color: var(--chalk-faint); font-weight: 500; }
  .match .towner { font-size: 14px; color: var(--chalk-faint); }
  .match .trank {
    font-family: var(--display);
    font-weight: 600;
    font-size: 27px;
    line-height: 1;
    color: var(--chalk-faint);
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  .match .mid { text-align: center; }
  .match .score {
    font-family: var(--display);
    font-weight: 700;
    font-size: 24px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .match .meta {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    white-space: nowrap;
  }
  .match.is-live { border-color: rgba(255,90,69,0.55); }
  .match.is-live .meta { color: var(--live); }

  /* Upset — lower-ranked team beat a higher-ranked one. Gold outline, a
     corner "UPSET" pill, and a slow gold shimmer sweeping across the card. */
  /* The UPSET pill pokes 10px above the card (top:-10px); add that much top
     spacing so the pill doesn't crowd the card above it (e.g. two upsets in a row). */
  .match.upset { position: relative; border-color: var(--gold); margin-top: 10px; }
  .match.upset::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(100deg, transparent 32%,
      rgba(232,195,74,0.16) 50%, transparent 68%);
    background-size: 250% 100%;
    background-position: 150% 0;
    animation: upsetSweep 4s ease-in-out infinite;
  }
  @keyframes upsetSweep {
    0% { background-position: 150% 0; }
    55%, 100% { background-position: -60% 0; }
  }
  .upset-badge {
    position: absolute;
    top: -10px;
    left: 16px;
    z-index: 4;
    background: var(--gold);
    color: var(--pitch-deep);
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.14em;
    padding: 2px 10px;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  /* ---------- Next-match countdown ---------- */
  .countdown {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 12px;
    padding: 16px 18px 18px;
    text-align: center;
    margin-bottom: 8px;
  }
  .cd-label {
    font-family: var(--display);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--chalk-dim);
  }
  /* Fixed-size blocks so nothing shifts as the timer ticks: the timer box,
     each name box, and each rank slot are all fixed width. Long names wrap
     inside their box. */
  .cd-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 1.4vw, 16px);
    margin-top: 8px;
  }
  .cd-team { display: flex; align-items: center; gap: clamp(7px, 1vw, 13px); }
  .cd-tinfo { width: clamp(78px, 18.5vw, 165px); }
  .cd-team.home .cd-tinfo { text-align: right; }
  .cd-team.away .cd-tinfo { text-align: left; }
  .cd-center { width: clamp(118px, 32.8vw, 300px); flex: 0 0 auto; }
  .cd-timer {
    font-family: var(--display);
    font-weight: 700;
    font-size: clamp(18px, 5.4vw, 50px);
    line-height: 1.02;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .cd-name { font-weight: 600; font-size: clamp(12px, 2.8vw, 25px); line-height: 1.12; overflow-wrap: break-word; }
  .cd-owner { font-size: clamp(11px, 1.7vw, 16px); color: var(--chalk-faint); }
  .cd-rank {
    width: clamp(44px, 6.8vw, 60px);
    flex: 0 0 auto;
    font-family: var(--display);
    font-weight: 600;
    font-size: clamp(17px, 3.6vw, 33px);
    line-height: 1;
    color: var(--chalk-faint);
    font-variant-numeric: tabular-nums;
  }
  .cd-team.home .cd-rank { text-align: left; }
  .cd-team.away .cd-rank { text-align: right; }
  .cd-stage {
    font-size: clamp(9.5px, 1.3vw, 12px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    margin-top: 4px;
  }

  /* ---------- Events ---------- */
  .events { list-style: none; display: grid; gap: 8px; }
  .events li {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    font-size: 14.5px;
    padding: 9px 4px;
    border-bottom: 1px dashed var(--pitch-line);
  }
  .events .gain {
    font-family: var(--display);
    font-weight: 600;
    white-space: nowrap;
  }
  .events .owner { font-weight: 600; }

  /* ---------- Rules ---------- */
  .rules {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
  }
  .rule {
    border: 1px solid var(--pitch-line);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
    background: rgba(0,0,0,0.1);
  }
  .rule .v { font-family: var(--display); font-weight: 700; font-size: 22px; }
  .rule .k { font-size: 11.5px; color: var(--chalk-dim); }

  /* ---------- Knockout bracket ---------- */
  .bracket {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    align-items: stretch;
    padding: 4px 2px 14px;
    -webkit-overflow-scrolling: touch;
  }
  .bround {
    min-width: 205px;
    flex: 0 0 205px;
    display: flex;
    flex-direction: column;
  }
  .bround-title {
    font-family: var(--display);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--chalk-dim);
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--pitch-line);
    margin-bottom: 10px;
  }
  .bround-title.minor { margin-top: 18px; }
  .bround-matches {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: 8px;
  }
  .bmatch {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
  }
  .bmatch.is-live { border-color: rgba(255,90,69,0.55); }
  .bline {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    padding: 2px 0;
  }
  .bline .bn { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bline .bo { font-size: 10.5px; color: var(--chalk-faint); }
  .bline .bg { font-family: var(--display); font-weight: 600; font-variant-numeric: tabular-nums; }
  .bline.winner .bn { font-weight: 600; }
  .bline.loser { color: var(--chalk-faint); }
  .bline.loser .bg { color: var(--chalk-faint); }
  .bline.loser .bn {
    text-decoration: line-through;
    text-decoration-color: var(--live);
    text-decoration-thickness: 1.5px;
  }
  .bline.projd .bn { font-style: italic; color: var(--chalk-dim); }
  .bline.unres .bn { font-style: italic; color: var(--chalk-faint); font-weight: 400; }
  .bmeta {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    margin-top: 3px;
    border-top: 1px dashed var(--pitch-line);
    padding-top: 3px;
  }
  .bmatch.is-live .bmeta { color: var(--live); }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 2px 0 6px;
  }
  .tab {
    font-family: var(--display);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--chalk-dim);
    background: var(--pitch-deep);
    border: 1px solid var(--pitch-line);
    border-radius: 999px;
    padding: 9px 24px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .tab:hover { color: var(--chalk); }
  .tab.active {
    color: var(--pitch-deep);
    background: var(--chalk);
    border-color: var(--chalk);
  }
  .tab:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  /* ---------- Group tables ---------- */
  .ggrid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 12px;
  }
  .gcard {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .gname {
    font-family: var(--display);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .gpending {
    font-family: var(--body);
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--chalk-faint);
    font-style: italic;
  }
  .gtable { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .gtable th {
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--chalk-faint);
    text-align: center;
    padding: 2px 4px;
  }
  .gtable th.l, .gtable td.gteam { text-align: left; }
  .gtable td {
    padding: 5px 4px;
    border-top: 1px dashed var(--pitch-line);
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  /* Position column narrow, team column flexible, every stat column the
     same fixed width so P/Pts/GD/GF/Cond/FIFA are equidistant and centered. */
  .gtable th:nth-child(1), .gtable td:nth-child(1) { width: 24px; }
  .gtable td.gteam { width: auto; overflow: hidden; text-overflow: ellipsis; }
  .gtable th:nth-child(n+3), .gtable td:nth-child(n+3) { width: 32px; }
  .gpos { color: var(--chalk-faint); }
  .gowner { display: block; font-size: 10.5px; color: var(--chalk-faint); }
  .gtable tr.adv td { background: rgba(242, 240, 228, 0.06); }
  .gtable tr.adv td.gteam, .gtable tr.adv td.gpts { font-weight: 600; }
  .gtable-wrap {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 10px;
    padding: 6px 14px 10px;
    overflow-x: auto;
  }
  .gnote { font-size: 13.5px; color: var(--chalk-dim); margin: 10px 2px; }

  /* ---------- Rulebook (large highlighted rules text) ---------- */
  .rulebook {
    border: 1px solid var(--pitch-line);
    background: var(--pitch-deep);
    border-radius: 12px;
    padding: 26px 26px 30px;
    font-size: 18px;
    line-height: 1.65;
  }
  .rulebook h3 {
    font-family: var(--display);
    font-weight: 600;
    font-size: 24px;
    letter-spacing: 0.03em;
    margin: 26px 0 10px;
  }
  .rulebook h3:first-child { margin-top: 0; }
  .rulebook p { color: var(--chalk-dim); margin-bottom: 10px; }
  .rulebook mark {
    background: rgba(232, 195, 74, 0.22);
    color: var(--chalk);
    padding: 0 4px;
    border-radius: 3px;
  }
  ol.criteria { list-style: none; counter-reset: c; margin: 14px 0 6px; }
  ol.criteria li {
    counter-increment: c;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--pitch-line);
    font-family: var(--display);
    font-weight: 500;
    font-size: 21px;
    letter-spacing: 0.02em;
  }
  ol.criteria li::before {
    content: counter(c);
    font-size: 15px;
    color: var(--chalk-dim);
    border: 1.5px solid var(--pitch-line);
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 32px;
  }
  ul.cardpts { list-style: none; margin-top: 12px; display: grid; gap: 8px; }
  ul.cardpts li {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-size: 18px;
  }
  ul.cardpts .v {
    font-family: var(--display);
    font-weight: 700;
    font-size: 26px;
    min-width: 58px;
    text-align: right;
    background: rgba(232, 195, 74, 0.22);
    border-radius: 6px;
    padding: 0 8px;
  }

  .empty {
    color: var(--chalk-faint);
    font-style: italic;
    padding: 14px 4px;
  }
  .error {
    border: 1px solid rgba(255,90,69,0.5);
    border-radius: 10px;
    padding: 16px;
    background: rgba(255,90,69,0.08);
  }
  footer {
    margin-top: 56px;
    text-align: center;
    font-size: 12.5px;
    color: var(--chalk-faint);
  }

  @media (min-width: 561px) {
    /* Desktop-only leaderboard tweaks */
    .eyebrow { font-size: 13.7px; }       /* +5% */
    .sub { font-size: 16.5px; }           /* +10% */
    .section-head h2 { font-size: 21px; } /* +5% */
    /* Put each person's country chips on the same line as their name so the
       standings read as thin single-line rows, evenly spread across width. */
    .who { display: flex; align-items: center; gap: 18px; }
    .who .name { white-space: nowrap; flex: 0 0 auto; }
    .teams { margin-top: 0; flex: 0 1 auto; flex-wrap: nowrap; gap: 10px; }
  }

  /* Countdown switches to the stacked (rank-on-top) layout before the wider
     beside-the-timer row would run out of room and clip a team name. Sizes
     come from the shared clamp()s above, so the text still scales fluidly. */
  @media (max-width: 740px) {
    .cd-team { flex-direction: column; gap: 1px; }
    .cd-team.home { align-items: flex-start; }
    .cd-team.away { align-items: flex-end; }
    .cd-team.home .cd-tinfo { text-align: left; }
    .cd-team.away .cd-tinfo { text-align: right; }
    .cd-rank { width: clamp(78px, 18.5vw, 165px); }
    .cd-team.home .cd-rank { text-align: left; order: -1; }
    .cd-team.away .cd-rank { text-align: right; }
  }

  @media (max-width: 560px) {
    .row { grid-template-columns: 40px 1fr auto; gap: 0 10px; }
    .rank { width: 32px; height: 32px; font-size: 15px; }
    .who .name { font-size: 18px; }
    .pts { font-size: 27px; min-width: 52px; }
    /* Mobile keeps the original compact single-row match card: no FIFA
       ranks, original font sizes. (Desktop keeps the larger names + ranks.) */
    .match { padding: 10px 12px; }
    .match .trank { display: none; }
    .match .tname { font-size: 13.5px; }
    .match .towner { font-size: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="center-circle" aria-hidden="true"></div>
    <div class="eyebrow">World Cup 2026 &middot; Family Pool</div>
    <h1>The Family Cup</h1>
    <div class="sub">One tournament. Fourteen rivals. No mercy at the dinner table.</div>
    <div class="updated" id="updated">Loading scores…</div>
  </header>

  <nav class="tabs" aria-label="Site sections">
    <button class="tab active" data-view="home">Leaderboard</button>
    <button class="tab" data-view="groups">Groups</button>
    <button class="tab" data-view="bracket">Bracket</button>
    <button class="tab" data-view="conduct">Conduct</button>
  </nav>

  <div id="app"></div>

  <footer>
    Scores via football-data.org &middot; updates automatically every 20 minutes &middot;
    kickoff times shown in your local time
  </footer>
</div>

<script>
(function () {
  const app = document.getElementById("app");
  const updatedEl = document.getElementById("updated");
  const esc = s => String(s ?? "").replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  const fmtPts = p => (p % 1 === 0 ? String(p) : p.toFixed(1));
  const fmtKick = iso => {
    if (!iso) return "";
    const d = new Date(iso);
    return d.toLocaleString(undefined, {
      weekday: "short", month: "short", day: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  };

  function teamCell(t, side) {
    const unres = t.resolved === false;
    const proj = t.projected === true;
    const nm = unres ? esc(t.slot || "TBD") : esc(t.name);
    const hasRank = !unres && t.fifaRank !== null && t.fifaRank !== undefined;
    const rankEl = `<div class="trank">${hasRank ? "#" + t.fifaRank : ""}</div>`;
    const sub = t.owner ? esc(t.owner)
      : (proj && t.slot ? esc(t.slot) : "&mdash;");
    const info = `<div class="tinfo">
      <div class="tname ${proj ? "proj" : ""} ${unres ? "unres" : ""}">${nm}</div>
      <div class="towner">${sub}</div>
    </div>`;
    // Big rank sits right beside the team name (inner side), vertically
    // centered: after the info for home, before it for the away team.
    return `<div class="team ${side}">
      ${side === "away" ? rankEl + info : info + rankEl}
    </div>`;
  }

  function fmtCountdown(ms) {
    if (ms <= 0) return null;
    const s = Math.floor(ms / 1000);
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (d > 0) return `${d}d ${h}h ${m}m`;
    if (h > 0) return `${h}h ${m}m ${sec}s`;
    if (m > 0) return `${m}m ${sec}s`;
    return `${sec}s`;
  }

  // Updates the live timer every second and removes the card the instant its
  // own countdown crosses zero (rather than sitting at 0:00 while the data
  // refresh catches up).
  function tickCountdown() {
    const el = document.getElementById("countdown");
    if (!el) return;
    const txt = fmtCountdown(new Date(el.dataset.kickoff).getTime() - Date.now());
    if (txt === null) { el.remove(); return; }
    const t = el.querySelector(".cd-timer");
    if (t) t.textContent = txt;
  }

  function countdownCard(m) {
    const rank = t => (t.fifaRank !== null && t.fifaRank !== undefined)
      ? `<div class="cd-rank">#${t.fifaRank}</div>` : "";
    const info = t => `<div class="cd-tinfo">
      <div class="cd-name">${esc(t.name)}</div>
      <div class="cd-owner">${t.owner ? esc(t.owner) : "&mdash;"}</div></div>`;
    const initial = fmtCountdown(new Date(m.utcDate).getTime() - Date.now()) || "";
    return `<div class="countdown" id="countdown" data-kickoff="${esc(m.utcDate)}">
      <div class="cd-label">Next match</div>
      <div class="cd-row">
        <div class="cd-team home">${info(m.home)}${rank(m.home)}</div>
        <div class="cd-center">
          <div class="cd-timer">${initial}</div>
          <div class="cd-stage">${esc(m.stage)}</div>
        </div>
        <div class="cd-team away">${rank(m.away)}${info(m.away)}</div>
      </div>
    </div>`;
  }

  function matchCard(m) {
    const live = m.status === "IN_PLAY" || m.status === "PAUSED";
    const done = m.status === "FINISHED" || m.status === "AWARDED";
    const hasScore = m.home.goals !== null && m.home.goals !== undefined;
    // Upset: a finished game the lower-ranked side won by a clear margin —
    // the winner's FIFA rank number is at least 5 higher than the loser's.
    // Penalty wins count (the winner is the team that advanced). Both ranks
    // must be known.
    let upset = false;
    if (done && m.winner && m.winner !== "DRAW") {
      const wr = m.winner === "HOME_TEAM" ? m.home.fifaRank : m.away.fifaRank;
      const lr = m.winner === "HOME_TEAM" ? m.away.fifaRank : m.home.fifaRank;
      if (wr != null && lr != null && wr - lr >= 5) upset = true;
    }
    const mid = (live || done) && hasScore
      ? `<div class="score">${m.home.goals}&ndash;${m.away.goals}</div>
         <div class="meta">${live ? '<span class="live-dot"></span> Live' : (m.penalties ? "FT &middot; pens" : "FT")} &middot; ${esc(m.stage)}</div>`
      : `<div class="score" style="font-size:15px;font-weight:500;color:var(--chalk-dim)">${esc(fmtKick(m.utcDate))}</div>
         <div class="meta">${esc(m.stage)}</div>`;
    return `<div class="match ${live ? "is-live" : ""} ${upset ? "upset" : ""}">
      ${upset ? '<div class="upset-badge">UPSET</div>' : ""}
      ${teamCell(m.home, "home")}
      <div class="mid">${mid}</div>
      ${teamCell(m.away, "away")}
    </div>`;
  }

  function section(title, inner) {
    return `<section><div class="section-head"><h2>${title}</h2></div>${inner}</section>`;
  }

  function render(data) {
    const when = data.generated ? new Date(data.generated).toLocaleString() : "—";
    const anyLive = (data.live || []).length > 0;
    updatedEl.innerHTML = (anyLive ? '<span class="live-dot"></span> ' : "") +
      "Scores as of " + esc(when);
    app.innerHTML = view === "groups" ? renderGroups(data)
                  : view === "bracket" ? renderBracket(data)
                  : view === "conduct" ? renderConduct(data)
                  : renderHome(data);
    tickCountdown();
  }

  function renderHome(data) {
    let html = "";

    if ((data.live || []).length) {
      html += section('<span class="live-dot"></span>&nbsp;Live now',
        `<div class="matches">${data.live.map(matchCard).join("")}</div>`);
    } else {
      // No live game — count down to the first upcoming fixture, but only
      // while it's genuinely still in the future.
      const next = (data.upcoming || [])[0];
      if (next && next.utcDate &&
          new Date(next.utcDate).getTime() > Date.now()) {
        html += countdownCard(next);
      }
    }

    // Leaderboard
    const rows = (data.leaderboard || []).map(r => {
      const chips = r.teams.map(t =>
        `<span class="chip ${t.eliminated ? "out" : ""}">${esc(t.name)} <b>${fmtPts(t.points)}</b></span>`
      ).join("");
      return `<div class="row ${r.rank === 1 && r.points > 0 ? "leader" : ""}">
        <div class="rank">${r.rank}</div>
        <div class="who"><div class="name">${esc(r.name)}</div><div class="teams">${chips}</div></div>
        <div class="pts">${fmtPts(r.points)}<small>pts</small></div>
      </div>`;
    }).join("");
    html += section("Standings", `<div class="board">${rows}</div>`);

    // Recent scoring events
    const ev = (data.events || []).map(e =>
      `<li><span><span class="owner">${esc(e.owner)}</span> &middot; ${esc(e.label)}</span>
       <span class="gain">+${fmtPts(e.points)}</span></li>`).join("");
    html += section("Latest points",
      ev ? `<ul class="events">${ev}</ul>`
         : `<div class="empty">No points scored yet — they'll appear here once the tournament kicks off.</div>`);

    // Recent results
    const rec = (data.recent || []).map(matchCard).join("");
    if (rec) html += section("Recent results", `<div class="matches">${rec}</div>`);

    // Upcoming
    const up = (data.upcoming || []).map(matchCard).join("");
    if (up) html += section("Coming up", `<div class="matches">${up}</div>`);

    // Rules
    const s = data.scoring || {};
    const rules = [
      ["Group win", s.GROUP_STAGE_WIN], ["Group draw", s.GROUP_STAGE_DRAW],
      ["Round of 32", s.LAST_32], ["Round of 16", s.LAST_16],
      ["Quarter-final", s.QUARTER_FINALS], ["Semi-final", s.SEMI_FINALS],
      ["Final", s.FINAL]
    ];
    if (s.THIRD_PLACE) rules.splice(6, 0, ["Third place", s.THIRD_PLACE]);
    html += section("How points work",
      `<div class="rules">${rules.map(([k, v]) =>
        `<div class="rule"><div class="v">${fmtPts(v ?? 0)}</div><div class="k">${esc(k)}</div></div>`).join("")}</div>`);

    return html;
  }

  function renderGroups(data) {
    let html = "";
    const signedGD = n => (n > 0 ? "+" + n : String(n));

    // The 12 group tables
    const gs = data.groups || [];
    if (gs.length) {
      const cards = gs.map(g => {
        const trs = g.table.map(r =>
          `<tr class="${g.ranked && r.pos <= 2 ? "adv" : ""}">
            <td class="gpos">${r.pos}</td>
            <td class="gteam">${esc(r.team)}${r.owner ? `<span class="gowner">${esc(r.owner)}</span>` : ""}</td>
            <td>${r.played}</td><td class="gpts">${r.points}</td><td>${signedGD(r.gd)}</td>
            <td>${r.gf}</td><td>${r.conduct ?? 0}</td><td>${r.fifaRank ?? "&mdash;"}</td>
          </tr>`).join("");
        return `<div class="gcard"><div class="gname">${esc(g.group)}${g.ranked ? "" : ` <span class="gpending">awaiting first games</span>`}</div>
          <table class="gtable">
            <thead><tr><th></th><th class="l">Team</th><th>P</th><th>Pts</th><th>GD</th><th>GF</th><th>Con</th><th>FIFA</th></tr></thead>
            <tbody>${trs}</tbody></table></div>`;
      }).join("");
      html += section("Group tables", `<div class="ggrid">${cards}</div>
        <p class="gnote">Highlighted rows are in the automatic qualification places (top two). Ties are broken by head-to-head record first, then overall goal difference, goals scored, conduct score, and FIFA ranking. Groups are only ranked once every team has played at least one game.</p>`);
    } else {
      html += section("Group tables",
        `<div class="empty">Group tables appear here once the tournament data is available.</div>`);
    }

    // Best third-place race
    const th = data.thirdPlace || [];
    if (th.length) {
      const trs = th.map(t =>
        `<tr class="${t.qualifies ? "adv" : ""}">
          <td class="gpos">${t.rank}</td>
          <td class="gteam">${esc(t.team)}
            <span class="gowner">${esc(t.group)}${t.owner ? " &middot; " + esc(t.owner) : ""}</span></td>
          <td>${t.played}</td><td>${t.points}</td><td>${signedGD(t.gd)}</td><td>${t.gf}</td>
          <td>${t.conduct ?? 0}</td><td>${t.fifaRank ?? "&mdash;"}</td>
        </tr>`).join("");
      html += section("Best third-place race", `
        <p class="gnote">The top <b>8</b> third-placed teams (highlighted) advance to the
        Round of 32. Ranked by points, then goal difference, goals scored, conduct score,
        and FIFA world ranking.</p>
        <div class="gtable-wrap"><table class="gtable">
          <thead><tr><th></th><th class="l">Team</th><th>P</th><th>Pts</th><th>GD</th><th>GF</th><th>Con</th><th>FIFA</th></tr></thead>
          <tbody>${trs}</tbody></table></div>`);
    }

    // Qualification & tiebreak rulebook — large, clear, highlighted
    html += section("How third place is decided", `<div class="rulebook">
      <h3>How will the best third-place teams be determined?</h3>
      <p>Similar to the group tiebreakers, the third-placed teams in the group stage
         will be ranked by these criteria, <mark>in order</mark>:</p>
      <ol class="criteria">
        <li>Points</li>
        <li>Goal difference</li>
        <li>Goals scored</li>
        <li>Team conduct score</li>
        <li>FIFA world ranking</li>
      </ol>
      <h3>How is team conduct score calculated?</h3>
      <p>Yellow cards and red cards accumulated are the two elements used to calculate
         this, with cards issued to <mark>both players and team officials</mark> contributing
         to the score.</p>
      <ul class="cardpts">
        <li><span class="v">&minus;1</span> Yellow card</li>
        <li><span class="v">&minus;3</span> Indirect red card (resulting from a second yellow card)</li>
        <li><span class="v">&minus;4</span> Direct red card</li>
        <li><span class="v">&minus;5</span> Yellow card and direct red card</li>
      </ul>
    </div>`);

    return html;
  }

  function renderBracket(data) {
    const rounds = (data.bracket || []);
    if (!rounds.length) {
      return section("Knockout bracket",
        `<div class="empty">The bracket appears here once tournament data loads.</div>`);
    }
    const anyProjected = rounds.some(r => r.matches.some(m =>
      m.home.projected || m.away.projected));
    const bline = (t, side, m) => {
      const live = m.status === "IN_PLAY" || m.status === "PAUSED";
      const done = m.status === "FINISHED" || m.status === "AWARDED";
      let cls = t.projected ? "projd" : (!t.resolved ? "unres" : "");
      if (done && m.winner && m.winner !== "DRAW") {
        const won = (m.winner === "HOME_TEAM") === (side === "home");
        cls = won ? "winner" : "loser";
      }
      const goals = (done || live) && t.goals !== null && t.goals !== undefined
        ? `<span class="bg">${t.goals}</span>` : "";
      const name = t.resolved ? esc(t.name) : esc(t.slot);
      const sub = t.resolved
        ? [t.projected ? esc(t.slot) : "", t.owner ? esc(t.owner) : ""]
            .filter(Boolean).join(" &middot; ")
        : "";
      return `<div class="bline ${cls}">
        <span class="bn">${name}${sub ? ` <span class="bo">${sub}</span>` : ""}</span>
        ${goals}</div>`;
    };
    const bcard = m => {
      const live = m.status === "IN_PLAY" || m.status === "PAUSED";
      const done = m.status === "FINISHED" || m.status === "AWARDED";
      const meta = live ? '<span class="live-dot"></span> Live'
        : done ? (m.penalties ? "FT &middot; pens" : "FT")
        : (m.utcDate ? esc(fmtKick(m.utcDate)) : "Date TBC");
      return `<div class="bmatch ${live ? "is-live" : ""}">
        ${bline(m.home, "home", m)}${bline(m.away, "away", m)}
        <div class="bmeta">M${m.matchNo ?? ""} &middot; ${meta}</div></div>`;
    };
    const cols = [];
    const byCode = Object.fromEntries(rounds.map(r => [r.stageCode, r]));
    ["LAST_32", "LAST_16", "QUARTER_FINALS", "SEMI_FINALS"].forEach(code => {
      const r = byCode[code];
      if (r) cols.push(`<div class="bround"><div class="bround-title">${esc(r.stage)}</div>
        <div class="bround-matches">${r.matches.map(bcard).join("")}</div></div>`);
    });
    const fin = byCode["FINAL"], third = byCode["THIRD_PLACE"];
    if (fin || third) {
      let col = `<div class="bround">`;
      if (fin) col += `<div class="bround-title">${esc(fin.stage)}</div>
        <div class="bround-matches" style="flex:0">${fin.matches.map(bcard).join("")}</div>`;
      if (third) col += `<div class="bround-title minor">${esc(third.stage)}</div>
        <div class="bround-matches" style="flex:0">${third.matches.map(bcard).join("")}</div>`;
      cols.push(col + `</div>`);
    }
    return section("Knockout bracket", `
      ${anyProjected
        ? `<p class="gnote"><i>Italic teams are projected from the current
           standings</i> — they update after every group game and lock in as
           groups finish. Third-place slots follow FIFA's official allocation
           table (Annex C), so this is the real bracket if the groups ended today.</p>`
        : ""}
      <div class="bracket">${cols.join("")}</div>`);
  }

  function renderConduct(data) {
    const cd = data.conduct || {};
    const people = cd.people || [];
    const teams = cd.teams || [];
    if (!people.length && !teams.length) {
      return section("Conduct", `<div class="empty">Conduct data appears here
        once card counts are entered in <b>cards-manual.json</b>.</div>`);
    }
    let html = "";

    // Worst conduct — same look as the main standings, inverted honor
    const rows = people.map(p => {
      const chips = p.teams.map(t =>
        `<span class="chip">${esc(t.name)} <b>${t.score}</b></span>`).join("");
      return `<div class="row ${p.rank === 1 && p.score < 0 ? "leader" : ""}">
        <div class="rank">${p.rank}</div>
        <div class="who"><div class="name">${esc(p.name)}</div><div class="teams">${chips}</div></div>
        <div class="pts">${p.score}<small>card pts</small></div>
      </div>`;
    }).join("");
    html += section("Worst conduct", `
      <p class="gnote">Every card your teams collect counts against you.
      Rank 1 holds the family's dirtiest squad list &mdash; wear it proudly.</p>
      <div class="board">${rows}</div>`);

    // Full team table
    if (teams.length) {
      const ctrs = teams.map(t =>
        `<tr>
          <td class="gpos">${t.rank}</td>
          <td class="gteam">${esc(t.team)}${t.owner ? `<span class="gowner">${esc(t.owner)}</span>` : ""}</td>
          <td>${t.yellow}</td><td>${t.indirect_red}</td><td>${t.direct_red}</td>
          <td>${t.yellow_direct_red}</td><td class="gpts">${t.score}</td>
        </tr>`).join("");
      html += section("Team conduct score", `
        <p class="gnote">Best-behaved teams first &mdash; this is tiebreaker #4 in the
        best-third-place race on the Groups page. Yellow &minus;1 &middot;
        second-yellow red &minus;3 &middot; straight red &minus;4 &middot;
        yellow then straight red &minus;5. Cards issued to players and team
        officials both count.</p>
        <div class="gtable-wrap"><table class="gtable">
          <thead><tr><th></th><th class="l">Team</th><th>Y</th><th>2Y&rarr;R</th><th>R</th><th>Y+R</th><th>Score</th></tr></thead>
          <tbody>${ctrs}</tbody></table></div>
        ${cd.hasData ? "" :
          `<p class="gnote">No cards entered yet &mdash; totals update when
           <b>cards-manual.json</b> in the repository is edited.</p>`}`);
    }
    return html;
  }

  // ---------- Tab switching with hash routing ----------
  let view = ["groups", "bracket", "conduct"].includes(location.hash.slice(1))
    ? location.hash.slice(1) : "home";
  let lastData = null;

  function setView(v) {
    view = v;
    history.replaceState(null, "", v === "home" ? location.pathname : "#" + v);
    document.querySelectorAll(".tab").forEach(b =>
      b.classList.toggle("active", b.dataset.view === v));
    if (lastData) render(lastData);
    window.scrollTo({ top: 0 });
  }
  document.querySelectorAll(".tab").forEach(b =>
    b.addEventListener("click", () => setView(b.dataset.view)));
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.dataset.view === view));

  function fail() {
    updatedEl.textContent = "Couldn't load scores";
    app.innerHTML = `<section><div class="error">
      <strong>No score data yet.</strong> If you just set this site up, run the
      “Update scores” workflow once from the repository's Actions tab, then refresh.
    </div></section>`;
  }

  function load() {
    fetch("data.json?t=" + Date.now())
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(d => { lastData = d; render(d); })
      .catch(fail);
  }

  load();
  setInterval(load, 5 * 60 * 1000); // re-check every 5 minutes while the page is open
  setInterval(tickCountdown, 1000); // smooth per-second countdown
})();
</script>
</body>
</html>
